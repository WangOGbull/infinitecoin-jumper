<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Infinitecoin Jumper - Final</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a2a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            touch-action: none;
        }
        .game-container {
            position: relative;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 24px;
            cursor: pointer;
            background: #0a0a2a;
        }
        
        #score {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 40px;
            color: #3b82f6;
            font-weight: bold;
            font-family: monospace;
            z-index: 10;
            border: 1px solid #3b82f6;
            display: none;
            white-space: nowrap;
        }
        
        .score-small { font-size: 16px; }
        .score-medium { font-size: 14px; }
        .score-large { font-size: 12px; }
        .score-xlarge { font-size: 10px; }
        
        #healthBarContainer {
            position: absolute;
            top: 38px;
            left: 12px;
            width: 100px;
            height: 8px;
            background: rgba(0,0,0,0.6);
            border-radius: 10px;
            z-index: 10;
            display: none;
            overflow: hidden;
            border: 1px solid #3b82f6;
        }
        #healthBar {
            width: 100%;
            height: 100%;
            background: #00ff00;
            transition: width 0.2s ease;
        }
        
        #pauseBtn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 4px 10px;
            border-radius: 40px;
            color: #3b82f6;
            font-weight: bold;
            font-size: 18px;
            z-index: 10;
            border: 1px solid #3b82f6;
            cursor: pointer;
            display: none;
        }
        
        /* Button container - below ground, inside game container */
        .button-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 12px;
            gap: 10px;
        }
        
        .left-buttons {
            display: flex;
            gap: 15px;
        }
        
        .action-btn {
            background: rgba(0,0,0,0.8);
            border: 3px solid #3b82f6;
            color: #3b82f6;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
            font-size: 28px;
            padding: 8px 20px;
            border-radius: 60px;
            text-align: center;
            box-shadow: 0 0 15px rgba(59,130,246,0.5);
            font-family: monospace;
            display: inline-block;
            transition: all 0.05s ease;
        }
        .action-btn:active {
            background: #3b82f6;
            color: #000;
            transform: scale(0.96);
        }
        
        .jump-btn {
            background: rgba(0,0,0,0.8);
            border: 3px solid #3b82f6;
            color: #3b82f6;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
            font-size: 36px;
            padding: 6px 32px;
            border-radius: 60px;
            text-align: center;
            box-shadow: 0 0 15px rgba(59,130,246,0.5);
            font-family: monospace;
            transition: all 0.05s ease;
        }
        .jump-btn:active {
            background: #3b82f6;
            color: #000;
            transform: scale(0.96);
        }
        
        .game-buttons {
            display: none;
        }
        
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            padding: 25px 35px;
            border-radius: 32px;
            text-align: center;
            z-index: 30;
            display: none;
            border: 2px solid #3b82f6;
        }
        #gameOver h2 {
            color: #3b82f6;
            margin-bottom: 15px;
            font-family: monospace;
        }
        #gameOver p {
            color: white;
            font-size: 22px;
            margin-bottom: 20px;
        }
        .gameover-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }
        .gameover-btn {
            background: #3b82f6;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 3px 0;
            font-family: monospace;
        }
        .gameover-btn:active {
            transform: scale(0.96);
        }
        .game-footer {
            position: absolute;
            bottom: -28px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            color: #3b82f6;
            display: none;
        }
        
        #pauseOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            z-index: 25;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        #pauseOverlay .pause-title {
            color: #3b82f6;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            font-family: monospace;
        }
        #pauseOverlay .pause-stats {
            color: white;
            font-size: 18px;
            text-align: center;
            margin-bottom: 10px;
            font-family: monospace;
        }
        #pauseOverlay .pause-stats span {
            color: #3b82f6;
            font-weight: bold;
        }
        .pause-btn-custom {
            background: rgba(59,130,246,0.2);
            border: 2px solid #3b82f6;
            color: #3b82f6;
            padding: 10px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            min-width: 160px;
            text-align: center;
            font-family: monospace;
        }
        .pause-btn-custom:active {
            background: #3b82f6;
            color: #000;
            transform: scale(0.96);
        }
        .pause-buttons-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }
        .sound-btn {
            background: rgba(0,0,0,0.6);
            border: 1px solid #3b82f6;
            color: #3b82f6;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 10px;
            font-family: monospace;
        }
        .sound-btn:active {
            background: #3b82f6;
            color: #000;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div id="score">∞ IFC: 0</div>
    <div id="healthBarContainer"><div id="healthBar"></div></div>
    <div id="pauseBtn">⏸️</div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    
    <!-- Game Buttons - Below ground, inside container -->
    <div class="game-buttons" id="gameButtons">
        <div class="button-container">
            <div class="left-buttons">
                <button class="action-btn" id="leftBtn" touch-action="none">◀</button>
                <button class="action-btn" id="rightBtn" touch-action="none">▶</button>
            </div>
            <button class="jump-btn" id="jumpBtn" touch-action="none">∞</button>
        </div>
    </div>
    
    <div id="pauseOverlay">
        <div class="pause-title">⏸️ GAME PAUSED</div>
        <div class="pause-stats">💰 CURRENT IFC: <span id="pauseCurrentScore">0</span></div>
        <div class="pause-stats">🏆 HIGH SCORE: <span id="pauseHighScore">0</span></div>
        <div class="pause-buttons-row">
            <div class="pause-btn-custom" id="claimBtn">🔧 SMART CONTRACT DEPLOYMENT SOON</div>
            <div class="pause-btn-custom" id="resumeBtn">▶️ RESUME</div>
            <div class="pause-btn-custom" id="pauseRestartBtn">🔄 RESTART</div>
            <div class="pause-btn-custom" id="exitMenuBtn">🏠 EXIT TO MENU</div>
            <div class="sound-btn" id="pauseSoundToggle">🔊 SOUND ON</div>
        </div>
    </div>
    <div id="gameOver">
        <h2>✦ GAME OVER ✦</h2>
        <p>∞ IFC: <span id="finalScore">0</span></p>
        <div class="gameover-buttons">
            <button class="gameover-btn" id="gameoverRestartBtn">🔄 RESTART</button>
            <button class="gameover-btn" id="gameoverClaimBtn">💰 CLAIM IFC</button>
            <button class="gameover-btn" id="gameoverHomeBtn">🏠 RETURN HOME</button>
        </div>
    </div>
    <div class="game-footer">∞ INFINITE COIN | COLLECT ∞ | AVOID VIRUSES | DOUBLE JUMP</div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 400, H = 600;
        canvas.width = W;
        canvas.height = H;

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.expand();
            window.Telegram.WebApp.ready();
        }

        // Character image
        const charImage = new Image();
        charImage.src = "https://i.postimg.cc/KjykLvS0/Adobe-Express-file.png";
        let charImageLoaded = false;
        charImage.onload = () => { charImageLoaded = true; };
        charImage.onerror = () => { console.log("Character image failed to load"); };

        // Background image
        const bgImage = new Image();
        bgImage.src = "https://i.postimg.cc/PrG8sJBr/5976645751045558267.jpg";
        let bgImageLoaded = false;
        bgImage.onload = () => { bgImageLoaded = true; };
        bgImage.onerror = () => { console.log("Background image failed to load"); };

        // Sound
        let soundEnabled = true;
        let audioContext = null;
        
        function initAudio() {
            if (!audioContext && (window.AudioContext || window.webkitAudioContext)) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playSound(type) {
            if (!soundEnabled || !audioContext) return;
            try {
                const now = audioContext.currentTime;
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.type = 'sine';
                gain.gain.value = 0.12;
                
                if (type === 'jump') {
                    osc.frequency.value = 523.25;
                    gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.3);
                    osc.start();
                    osc.stop(now + 0.3);
                } else if (type === 'collect') {
                    osc.frequency.value = 880;
                    gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.2);
                    osc.start();
                    osc.stop(now + 0.2);
                    setTimeout(() => {
                        const osc2 = audioContext.createOscillator();
                        const gain2 = audioContext.createGain();
                        osc2.connect(gain2);
                        gain2.connect(audioContext.destination);
                        osc2.frequency.value = 1046.5;
                        gain2.gain.value = 0.1;
                        gain2.gain.exponentialRampToValueAtTime(0.00001, now + 0.2);
                        osc2.start();
                        osc2.stop(now + 0.2);
                    }, 50);
                } else if (type === 'hit') {
                    osc.frequency.value = 130.81;
                    gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.4);
                    osc.start();
                    osc.stop(now + 0.4);
                } else if (type === 'gameover') {
                    osc.frequency.value = 98;
                    gain.gain.exponentialRampToValueAtTime(0.00001, now + 1);
                    osc.start();
                    osc.stop(now + 1);
                } else if (type === 'bonus') {
                    osc.frequency.value = 1318.52;
                    gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.5);
                    osc.start();
                    osc.stop(now + 0.5);
                    setTimeout(() => {
                        const osc2 = audioContext.createOscillator();
                        const gain2 = audioContext.createGain();
                        osc2.connect(gain2);
                        gain2.connect(audioContext.destination);
                        osc2.frequency.value = 1567.98;
                        gain2.gain.value = 0.12;
                        gain2.gain.exponentialRampToValueAtTime(0.00001, now + 0.5);
                        osc2.start();
                        osc2.stop(now + 0.5);
                    }, 100);
                } else if (type === 'health') {
                    osc.frequency.value = 659.25;
                    gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.4);
                    osc.start();
                    osc.stop(now + 0.4);
                    setTimeout(() => {
                        const osc2 = audioContext.createOscillator();
                        const gain2 = audioContext.createGain();
                        osc2.connect(gain2);
                        gain2.connect(audioContext.destination);
                        osc2.frequency.value = 783.99;
                        gain2.gain.value = 0.1;
                        gain2.gain.exponentialRampToValueAtTime(0.00001, now + 0.3);
                        osc2.start();
                        osc2.stop(now + 0.3);
                    }, 80);
                }
            } catch(e) { console.log('Audio error'); }
        }
        
        function toggleSound() {
            soundEnabled = !soundEnabled;
            const pauseSoundBtn = document.getElementById('pauseSoundToggle');
            if (pauseSoundBtn) pauseSoundBtn.innerText = soundEnabled ? '🔊 SOUND ON' : '🔇 SOUND OFF';
            if (soundEnabled && audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        // Game state
        let gameState = "menu";
        let gameRunning = false;
        let paused = false;
        let score = 0;
        let health = 100;
        let worldOffset = 0;
        let currentSpeed = 2.5;
        let hitBlinkCounter = 0;
        let difficultyTier = 0;
        let virusCount = 0;
        let consecutiveDodges = 0;
        let giftBoxSpawned = false;
        let giftBoxRewardGiven = false;
        let highScore = localStorage.getItem('infiniteJumperHighScore') || 0;
        let virusSpawnEnabled = true;
        let safeModeTimer = 0;
        let safeModeActive = false;
        
        let level4Active = false;
        
        let giftBoxesCollected = {1:0, 2:0, 3:0, 4:0};
        let giftBoxCooldown = 0;
        
        let giftBox = null;
        
        // Hold movement variables
        let leftPressed = false;
        let rightPressed = false;
        let moveInterval = null;
        
        // Daily bonus - 24 hours exact
        let dailyBonusAvailable = false;
        let dailyBonusClaimed = false;
        
        function checkDailyBonus() {
            const lastClaim = localStorage.getItem('lastPlayedTimestamp');
            if (!lastClaim) {
                dailyBonusAvailable = true;
                dailyBonusClaimed = false;
            } else {
                const hoursSince = (Date.now() - parseInt(lastClaim)) / (1000 * 60 * 60);
                if (hoursSince >= 24) {
                    dailyBonusAvailable = true;
                    dailyBonusClaimed = false;
                } else {
                    dailyBonusAvailable = false;
                    dailyBonusClaimed = true;
                }
            }
        }
        
        function claimDailyBonus() {
            if (!dailyBonusAvailable) return false;
            const bonus = 500;
            score += bonus;
            updateUI();
            dailyBonusAvailable = false;
            dailyBonusClaimed = true;
            localStorage.setItem('lastPlayedTimestamp', Date.now());
            alert(`✦ DAILY BONUS CLAIMED! +${bonus} IFC ✦`);
            return true;
        }
        
        function updateScoreFont() {
            const scoreEl = document.getElementById('score');
            if (!scoreEl) return;
            scoreEl.classList.remove('score-small', 'score-medium', 'score-large', 'score-xlarge');
            if (score >= 50000) {
                scoreEl.classList.add('score-xlarge');
            } else if (score >= 10000) {
                scoreEl.classList.add('score-large');
            } else if (score >= 5000) {
                scoreEl.classList.add('score-medium');
            } else if (score >= 1000) {
                scoreEl.classList.add('score-small');
            }
        }
        
        function getGiftBoxReward() {
            if (level4Active) return 10000;
            if (difficultyTier >= 3) return 5000;
            if (difficultyTier === 2) return 1000;
            if (difficultyTier === 1) return 500;
            return 0;
        }
        
        function getMaxGiftBoxes() {
            if (level4Active) return 2;
            if (difficultyTier >= 3) return 2;
            if (difficultyTier === 2) return 3;
            if (difficultyTier === 1) return 3;
            return 0;
        }
        
        function canSpawnGiftBox() {
            if (giftBox) return false;
            if (giftBoxCooldown > 0) return false;
            let collected = 0;
            if (level4Active) collected = giftBoxesCollected[4] || 0;
            else if (difficultyTier >= 3) collected = giftBoxesCollected[3] || 0;
            else if (difficultyTier === 2) collected = giftBoxesCollected[2] || 0;
            else if (difficultyTier === 1) collected = giftBoxesCollected[1] || 0;
            else return false;
            return collected < getMaxGiftBoxes();
        }
        
        function spawnGiftBox() {
            if (!canSpawnGiftBox()) return;
            let x = 250 + Math.random() * 200;
            let y = GROUND_Y - 40 - Math.random() * 50;
            giftBox = {
                x: x,
                y: y,
                width: 20,
                height: 20,
                collected: false,
                reward: getGiftBoxReward()
            };
            giftBoxCooldown = 300;
        }
        
        function recordGiftBoxCollected() {
            if (level4Active) {
                giftBoxesCollected[4] = (giftBoxesCollected[4] || 0) + 1;
            } else if (difficultyTier >= 3) {
                giftBoxesCollected[3] = (giftBoxesCollected[3] || 0) + 1;
            } else if (difficultyTier === 2) {
                giftBoxesCollected[2] = (giftBoxesCollected[2] || 0) + 1;
            } else if (difficultyTier === 1) {
                giftBoxesCollected[1] = (giftBoxesCollected[1] || 0) + 1;
            }
        }
        
        function startSafeMode(seconds) {
            safeModeActive = true;
            virusSpawnEnabled = false;
            safeModeTimer = seconds;
            
            const interval = setInterval(() => {
                if (!safeModeActive || gameState !== "playing") {
                    clearInterval(interval);
                    return;
                }
                safeModeTimer--;
                if (safeModeTimer <= 0) {
                    safeModeActive = false;
                    virusSpawnEnabled = true;
                    clearInterval(interval);
                }
            }, 1000);
        }

        function connectWallet() {
            alert('🔧 SMART CONTRACT DEPLOYMENT SOON\n\nReal IFC wallet connection and payouts will be available after the smart contract is deployed.');
        }

        let player = { x: 100, y: 0, vy: 0, width: 48, height: 54, grounded: false, doubleJumpUsed: false, baseJump: -9.5 };

        let groundSegments = [];
        const GROUND_Y = H - 60;
        const SEGMENT_WIDTH = 60;

        function initGround() {
            groundSegments = [];
            for (let i = 0; i < 20; i++) {
                groundSegments.push({ x: i * SEGMENT_WIDTH, y: GROUND_Y, w: SEGMENT_WIDTH });
            }
        }

        let collectibles = [];
        let viruses = [];
        let blackViruses = [];
        let healthItems = [];

        function getCoinValue() {
            if (level4Active) return Math.floor(Math.random() * 151) + 150;
            if (difficultyTier >= 3) return Math.floor(Math.random() * 101) + 80;
            if (difficultyTier >= 2) return Math.floor(Math.random() * 71) + 50;
            if (difficultyTier >= 1) return Math.floor(Math.random() * 41) + 20;
            return Math.floor(Math.random() * 31) + 10;
        }

        function spawnCollectible() {
            let x = 250 + Math.random() * 200;
            let y = GROUND_Y - 40 - Math.random() * 50;
            let value = getCoinValue();
            collectibles.push({ x: x, y: y, radius: 11, value: value, collected: false, floatOffset: Math.random() * Math.PI * 2 });
        }

        function spawnVirus(isBlack = false, isDeepRed = false) {
            if (!virusSpawnEnabled) return;
            if (level4Active) {
                let colorType = Math.random() > 0.5 ? 'deepred' : 'black';
                if (colorType === 'black') {
                    blackViruses.push({ x: 350 + Math.random() * 200, y: GROUND_Y - 28, width: 36, height: 40, active: false, shake: 0, level4: true, moveTowardPlayer: true });
                } else {
                    viruses.push({ x: 350 + Math.random() * 200, y: GROUND_Y - 24, width: 28, height: 32, active: false, shake: 0, level4: true, deepRed: true, moveTowardPlayer: true });
                }
            } else if (difficultyTier >= 3) {
                if (isBlack) {
                    blackViruses.push({ x: 350 + Math.random() * 200, y: GROUND_Y - 22, width: 24, height: 26, active: false, shake: 0 });
                } else {
                    viruses.push({ x: 350 + Math.random() * 200, y: GROUND_Y - 18, width: 18, height: 20, active: false, shake: 0 });
                }
            } else if (difficultyTier >= 2) {
                if (isBlack) {
                    blackViruses.push({ x: 350 + Math.random() * 200, y: GROUND_Y - 22, width: 24, height: 26, active: false, shake: 0 });
                } else {
                    viruses.push({ x: 350 + Math.random() * 200, y: GROUND_Y - 18, width: 18, height: 20, active: false, shake: 0 });
                }
            } else if (difficultyTier >= 1) {
                viruses.push({ x: 350 + Math.random() * 200, y: GROUND_Y - 18, width: 18, height: 20, active: false, shake: 0 });
            } else {
                viruses.push({ x: 350 + Math.random() * 200, y: GROUND_Y - 18, width: 18, height: 20, active: false, shake: 0 });
            }
        }

        function spawnClusteredViruses(count, isBlack = false) {
            if (!virusSpawnEnabled) return;
            let baseX = 350 + Math.random() * 150;
            let spacing = isBlack ? 50 : 40;
            for (let i = 0; i < count; i++) {
                if (level4Active) {
                    let colorType = Math.random() > 0.5 ? 'deepred' : 'black';
                    if (colorType === 'black') {
                        blackViruses.push({ x: baseX + (i * spacing), y: GROUND_Y - 28, width: 36, height: 40, active: false, shake: 0, level4: true, moveTowardPlayer: true });
                    } else {
                        viruses.push({ x: baseX + (i * spacing), y: GROUND_Y - 24, width: 28, height: 32, active: false, shake: 0, level4: true, deepRed: true, moveTowardPlayer: true });
                    }
                } else if (difficultyTier >= 3) {
                    if (isBlack) {
                        blackViruses.push({ x: baseX + (i * spacing), y: GROUND_Y - 22, width: 24, height: 26, active: false, shake: 0 });
                    } else {
                        viruses.push({ x: baseX + (i * spacing), y: GROUND_Y - 18, width: 18, height: 20, active: false, shake: 0 });
                    }
                } else if (difficultyTier >= 2) {
                    if (isBlack) {
                        blackViruses.push({ x: baseX + (i * spacing), y: GROUND_Y - 22, width: 24, height: 26, active: false, shake: 0 });
                    } else {
                        viruses.push({ x: baseX + (i * spacing), y: GROUND_Y - 18, width: 18, height: 20, active: false, shake: 0 });
                    }
                } else {
                    viruses.push({ x: baseX + (i * spacing), y: GROUND_Y - 18, width: 18, height: 20, active: false, shake: 0 });
                }
            }
        }

        function spawnHealthItem() {
            let x = 350 + Math.random() * 180;
            let y = GROUND_Y - 55 - Math.random() * 40;
            healthItems.push({ x: x, y: y, radius: 12, collected: false, floatOffset: Math.random() * Math.PI * 2 });
        }

        let spawnInterval, virusInterval;

        function updateUI() {
            const scoreEl = document.getElementById('score');
            scoreEl.innerHTML = `∞ IFC: ${score.toLocaleString()}`;
            updateScoreFont();
            
            let healthPercent = Math.max(0, health);
            document.getElementById('healthBar').style.width = `${healthPercent}%`;
            let hue = (healthPercent / 100) * 120;
            document.getElementById('healthBar').style.background = `hsl(${hue}, 100%, 50%)`;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('infiniteJumperHighScore', highScore);
            }
        }

        // Hold movement functions
        function startMoveLeft() {
            if (!gameRunning || paused) return;
            leftPressed = true;
            if (moveInterval) clearInterval(moveInterval);
            moveInterval = setInterval(() => {
                if (leftPressed && gameRunning && !paused) {
                    player.x -= 12;
                    if (player.x < 30) player.x = 30;
                }
            }, 50);
        }
        
        function stopMoveLeft() {
            leftPressed = false;
            if (!rightPressed && moveInterval) {
                clearInterval(moveInterval);
                moveInterval = null;
            }
        }
        
        function startMoveRight() {
            if (!gameRunning || paused) return;
            rightPressed = true;
            if (moveInterval) clearInterval(moveInterval);
            moveInterval = setInterval(() => {
                if (rightPressed && gameRunning && !paused) {
                    player.x += 12;
                    if (player.x + player.width > W - 30) player.x = W - 30 - player.width;
                }
            }, 50);
        }
        
        function stopMoveRight() {
            rightPressed = false;
            if (!leftPressed && moveInterval) {
                clearInterval(moveInterval);
                moveInterval = null;
            }
        }

        function startGame() {
            initAudio();
            if (audioContext && audioContext.state === 'suspended') audioContext.resume();
            gameState = "playing";
            gameRunning = true;
            paused = false;
            score = 0;
            health = 100;
            currentSpeed = 2.5;
            worldOffset = 0;
            hitBlinkCounter = 0;
            difficultyTier = 0;
            level4Active = false;
            virusCount = 0;
            consecutiveDodges = 0;
            giftBox = null;
            giftBoxSpawned = false;
            giftBoxRewardGiven = false;
            giftBoxCooldown = 0;
            giftBoxesCollected = {1:0, 2:0, 3:0, 4:0};
            collectibles = [];
            viruses = [];
            blackViruses = [];
            healthItems = [];
            player.baseJump = -9.5;
            player.x = 100;
            initGround();
            player.y = GROUND_Y - player.height;
            player.vy = 0;
            player.grounded = true;
            player.doubleJumpUsed = false;
            
            document.getElementById('score').style.display = 'block';
            document.getElementById('healthBarContainer').style.display = 'block';
            document.getElementById('pauseBtn').style.display = 'block';
            document.getElementById('gameButtons').style.display = 'block';
            document.getElementById('gameOver').style.display = 'none';
            document.querySelector('.game-footer').style.display = 'block';
            document.getElementById('pauseOverlay').style.display = 'none';
            updateUI();
            
            for (let i = 0; i < 6; i++) setTimeout(() => spawnCollectible(), i * 200);
            
            if (spawnInterval) clearInterval(spawnInterval);
            if (virusInterval) clearInterval(virusInterval);
            spawnInterval = setInterval(() => { if (gameRunning && !paused && collectibles.length < 8) spawnCollectible(); }, 1600);
            
            startSafeMode(5);
            
            virusInterval = setInterval(() => { 
                if (gameRunning && !paused && virusSpawnEnabled) {
                    virusCount++;
                    if (level4Active) {
                        if (viruses.length + blackViruses.length < 5) {
                            let colorType1 = Math.random() > 0.5 ? 'deepred' : 'black';
                            let colorType2 = Math.random() > 0.5 ? 'deepred' : 'black';
                            if (colorType1 === 'black') {
                                blackViruses.push({ x: 350 + Math.random() * 150, y: GROUND_Y - 28, width: 36, height: 40, active: false, shake: 0, level4: true, moveTowardPlayer: true });
                            } else {
                                viruses.push({ x: 350 + Math.random() * 150, y: GROUND_Y - 24, width: 28, height: 32, active: false, shake: 0, level4: true, deepRed: true, moveTowardPlayer: true });
                            }
                            if (colorType2 === 'black') {
                                blackViruses.push({ x: 380 + Math.random() * 150, y: GROUND_Y - 28, width: 36, height: 40, active: false, shake: 0, level4: true, moveTowardPlayer: true });
                            } else {
                                viruses.push({ x: 380 + Math.random() * 150, y: GROUND_Y - 24, width: 28, height: 32, active: false, shake: 0, level4: true, deepRed: true, moveTowardPlayer: true });
                            }
                            setTimeout(() => {
                                if (gameRunning && !paused && virusSpawnEnabled) {
                                    let colorType3 = Math.random() > 0.5 ? 'deepred' : 'black';
                                    if (colorType3 === 'black') {
                                        blackViruses.push({ x: 410 + Math.random() * 150, y: GROUND_Y - 28, width: 36, height: 40, active: false, shake: 0, level4: true, moveTowardPlayer: true, extraSpeed: true });
                                    } else {
                                        viruses.push({ x: 410 + Math.random() * 150, y: GROUND_Y - 24, width: 28, height: 32, active: false, shake: 0, level4: true, deepRed: true, moveTowardPlayer: true, extraSpeed: true });
                                    }
                                }
                            }, 1200);
                        }
                    } else if (difficultyTier >= 3) {
                        if (viruses.length < 2) spawnClusteredViruses(1, false);
                        if (blackViruses.length < 4) spawnClusteredViruses(3, true);
                    } else if (difficultyTier >= 2) {
                        if (viruses.length < 3) spawnClusteredViruses(2, false);
                        if (blackViruses.length < 3) spawnClusteredViruses(2, true);
                    } else if (difficultyTier >= 1) {
                        if (viruses.length < 3) spawnClusteredViruses(2, false);
                    } else {
                        if (viruses.length < 3) spawnVirus(false);
                    }
                    if (virusCount >= 6 && virusCount <= 8) {
                        spawnHealthItem();
                        virusCount = 0;
                    }
                    
                    if (canSpawnGiftBox() && Math.random() < 0.1) {
                        spawnGiftBox();
                    }
                }
            }, 2600);
            
            setInterval(() => {
                if (giftBoxCooldown > 0) giftBoxCooldown--;
            }, 100);
        }

        function updateCollectibles() {
            for (let i = 0; i < collectibles.length; i++) {
                let c = collectibles[i];
                c.x -= currentSpeed;
                if (!c.collected && player.x < c.x + c.radius && player.x + player.width > c.x - c.radius && player.y < c.y + c.radius && player.y + player.height > c.y - c.radius) {
                    c.collected = true;
                    score += c.value;
                    updateUI();
                    playSound('collect');
                    
                    if (score >= 100000 && !level4Active) {
                        level4Active = true;
                        currentSpeed = 8.5;
                        player.baseJump = -12.0;
                        startSafeMode(5);
                    } else if (score >= 4000 && difficultyTier < 3 && !level4Active) {
                        difficultyTier = 3;
                        currentSpeed = 7.5;
                        player.baseJump = -11.5;
                        startSafeMode(5);
                    } else if (score >= 2000 && difficultyTier < 2 && !level4Active) {
                        difficultyTier = 2;
                        currentSpeed = 6.2;
                        player.baseJump = -11.0;
                        startSafeMode(5);
                    } else if (score >= 1000 && difficultyTier < 1 && !level4Active) {
                        difficultyTier = 1;
                        currentSpeed = 4.0;
                        startSafeMode(5);
                    }
                    
                    if (level4Active) {
                        currentSpeed = 8.5 + Math.floor((score - 100000) / 50000) * 0.3;
                        if (currentSpeed > 9.5) currentSpeed = 9.5;
                    } else if (difficultyTier >= 3) {
                        currentSpeed = 7.5 + Math.floor((score - 4000) / 5000) * 0.2;
                        if (currentSpeed > 8.5) currentSpeed = 8.5;
                    } else if (difficultyTier >= 2) {
                        currentSpeed = 6.2 + Math.floor((score - 2000) / 1000) * 0.2;
                        if (currentSpeed > 7.2) currentSpeed = 7.2;
                    } else if (difficultyTier >= 1) {
                        currentSpeed = 4.0 + Math.floor((score - 1000) / 500) * 0.2;
                        if (currentSpeed > 5.5) currentSpeed = 5.5;
                    } else {
                        currentSpeed = 2.5 + Math.floor(score / 100) * 0.2;
                        if (currentSpeed > 3.5) currentSpeed = 3.5;
                    }
                }
                if (c.x + c.radius < 0 || c.collected) { collectibles.splice(i, 1); i--; }
            }
        }

        function updateGiftBox() {
            if (!giftBox || giftBox.collected) return;
            giftBox.x -= currentSpeed;
            if (!giftBox.collected && player.x < giftBox.x + giftBox.width && player.x + player.width > giftBox.x && player.y < giftBox.y + giftBox.height && player.y + player.height > giftBox.y) {
                giftBox.collected = true;
                score += giftBox.reward;
                updateUI();
                playSound('bonus');
                recordGiftBoxCollected();
                giftBox = null;
                giftBoxCooldown = 200;
            }
            if (giftBox && giftBox.x + giftBox.width < 0) {
                giftBox = null;
            }
        }

        function updateHealthItems() {
            for (let i = 0; i < healthItems.length; i++) {
                let h = healthItems[i];
                h.x -= currentSpeed;
                if (!h.collected && player.x < h.x + h.radius && player.x + player.width > h.x - h.radius && player.y < h.y + h.radius && player.y + player.height > h.y - h.radius) {
                    h.collected = true;
                    health = Math.min(100, health + 50);
                    updateUI();
                    playSound('health');
                }
                if (h.x + h.radius < 0 || h.collected) { healthItems.splice(i, 1); i--; }
            }
        }

        function updateViruses() {
            for (let i = 0; i < viruses.length; i++) {
                let v = viruses[i];
                if (v.moveTowardPlayer && level4Active) {
                    let dx = player.x - v.x;
                    if (Math.abs(dx) < 80) {
                        v.x += (dx > 0 ? (v.extraSpeed ? 2.5 : 1.5) : (v.extraSpeed ? -2.5 : -1.5));
                    }
                }
                v.x -= currentSpeed;
                v.shake = Math.sin(Date.now() * 0.015 + i) * 2;
                if (!v.active && player.x < v.x + v.width && player.x + player.width > v.x && player.y + player.height > v.y && player.y < v.y + v.height) {
                    v.active = true;
                    let dmg = (level4Active && v.level4) ? 30 : 10;
                    health = Math.max(0, health - dmg);
                    if (level4Active && v.level4) {
                        score = Math.max(0, score - 100);
                    }
                    updateUI();
                    hitBlinkCounter = 14;
                    playSound('hit');
                    consecutiveDodges = 0;
                    if (health <= 0) gameOver();
                }
                if (v.x + v.width < 0) { viruses.splice(i, 1); i--; }
            }
            for (let i = 0; i < blackViruses.length; i++) {
                let v = blackViruses[i];
                if (v.moveTowardPlayer && level4Active) {
                    let dx = player.x - v.x;
                    if (Math.abs(dx) < 80) {
                        v.x += (dx > 0 ? (v.extraSpeed ? 2.8 : 1.8) : (v.extraSpeed ? -2.8 : -1.8));
                    }
                }
                v.x -= currentSpeed;
                v.shake = Math.sin(Date.now() * 0.015 + i) * 3;
                if (!v.active && player.x < v.x + v.width && player.x + player.width > v.x && player.y + player.height > v.y && player.y < v.y + v.height) {
                    v.active = true;
                    let dmg = (level4Active && v.level4) ? 30 : 30;
                    health = Math.max(0, health - dmg);
                    if (level4Active && v.level4) {
                        score = Math.max(0, score - 100);
                    }
                    updateUI();
                    hitBlinkCounter = 14;
                    playSound('hit');
                    consecutiveDodges = 0;
                    if (health <= 0) gameOver();
                }
                if (v.x + v.width < 0) { blackViruses.splice(i, 1); i--; }
            }
        }

        function updatePlayer() {
            player.vy += 0.65;
            player.y += player.vy;
            player.grounded = false;
            for (let seg of groundSegments) {
                let worldX = seg.x - worldOffset;
                if (player.x + player.width > worldX && player.x < worldX + seg.w && player.y + player.height > seg.y && player.y + player.height < seg.y + 15) {
                    player.y = seg.y - player.height;
                    player.vy = 0;
                    player.grounded = true;
                    player.doubleJumpUsed = false;
                    break;
                }
            }
            if (player.x < 30) player.x = 30;
            if (player.x + player.width > W - 30) player.x = W - 30 - player.width;
            if (hitBlinkCounter > 0) hitBlinkCounter--;
        }

        function jump() {
            if (!gameRunning || paused) return;
            if (player.grounded) { 
                player.vy = player.baseJump; 
                player.grounded = false; 
                playSound('jump');
            } else if (!player.doubleJumpUsed) { 
                player.vy = player.baseJump + 0.8; 
                player.doubleJumpUsed = true; 
                playSound('jump');
            }
        }

        function togglePause() {
            if (gameState !== "playing") return;
            paused = !paused;
            if (paused) {
                document.getElementById('pauseCurrentScore').innerText = score.toLocaleString();
                document.getElementById('pauseHighScore').innerText = highScore.toLocaleString();
                document.getElementById('pauseOverlay').style.display = 'flex';
            } else {
                document.getElementById('pauseOverlay').style.display = 'none';
            }
        }

        function updateWorld() {
            worldOffset += currentSpeed;
            if (groundSegments[0].x - worldOffset + groundSegments[0].w < 0) {
                groundSegments.shift();
                let lastX = groundSegments[groundSegments.length-1].x;
                groundSegments.push({ x: lastX + SEGMENT_WIDTH, y: GROUND_Y, w: SEGMENT_WIDTH });
            }
        }

        function drawInfinity(x, y, size, value, isGlowing = true, color = '#3b82f6', shadowColor = '#3b82f6') {
            ctx.save();
            ctx.translate(x, y);
            if (isGlowing) { 
                ctx.shadowBlur = 18; 
                ctx.shadowColor = shadowColor;
            }
            ctx.beginPath();
            ctx.ellipse(-size*0.4, 0, size*0.4, size*0.25, 0, 0, Math.PI*2);
            ctx.ellipse(size*0.4, 0, size*0.4, size*0.25, 0, 0, Math.PI*2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.ellipse(-size*0.4, 0, size*0.2, size*0.12, 0, 0, Math.PI*2);
            ctx.ellipse(size*0.4, 0, size*0.2, size*0.12, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            ctx.restore();
            if (value) {
                ctx.font = `bold ${size-2}px monospace`;
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 6;
                ctx.fillText(`+${value}`, x-10, y-15);
                ctx.shadowBlur = 0;
            }
        }

        function drawGiftBox(x, y) {
            ctx.save();
            ctx.shadowBlur = 6;
            ctx.shadowColor = '#ff0000';
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(x-12, y-12, 24, 24);
            ctx.fillStyle = '#2a2a2a';
            ctx.fillRect(x-10, y-10, 20, 20);
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(x-12, y-3, 24, 6);
            ctx.fillRect(x-3, y-12, 6, 24);
            ctx.beginPath();
            ctx.moveTo(x-8, y-12);
            ctx.lineTo(x-14, y-20);
            ctx.lineTo(x-3, y-14);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(x+8, y-12);
            ctx.lineTo(x+14, y-20);
            ctx.lineTo(x+3, y-14);
            ctx.fill();
            ctx.restore();
        }

        function drawGreenHealth(x, y, size) {
            ctx.save();
            ctx.translate(x, y);
            ctx.shadowBlur = 18;
            ctx.shadowColor = '#ccff00';
            ctx.beginPath();
            ctx.ellipse(-size*0.4, 0, size*0.4, size*0.25, 0, 0, Math.PI*2);
            ctx.ellipse(size*0.4, 0, size*0.4, size*0.25, 0, 0, Math.PI*2);
            ctx.fillStyle = '#ccff00';
            ctx.fill();
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.ellipse(-size*0.4, 0, size*0.2, size*0.12, 0, 0, Math.PI*2);
            ctx.ellipse(size*0.4, 0, size*0.2, size*0.12, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            ctx.restore();
            ctx.font = `bold ${size-4}px monospace`;
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 6;
            ctx.fillText('+50%', x-15, y-12);
            ctx.shadowBlur = 0;
        }

        function drawVirus(x, y, shake, isBlack = false, isDeepRed = false, isLevel4 = false) {
            ctx.save();
            ctx.translate(x + shake, y);
            let width = isLevel4 ? (isBlack ? 36 : 28) : (isBlack ? 24 : 18);
            let height = isLevel4 ? (isBlack ? 40 : 32) : (isBlack ? 26 : 20);
            let mainColor = isBlack ? '#1a1a1a' : (isDeepRed ? '#8b0000' : '#8b0000');
            let innerColor = isBlack ? '#333333' : (isDeepRed ? '#cc0000' : '#ff4444');
            ctx.fillStyle = mainColor;
            ctx.beginPath();
            ctx.ellipse(width/2, height/2, width/2, height/2, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = innerColor;
            ctx.beginPath();
            ctx.ellipse(width/2, height/2, width/2.5, height/2.5, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.ellipse(width/3, height/3, width/8, height/8, 0, 0, Math.PI*2);
            ctx.ellipse(width - width/3, height/3, width/8, height/8, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.ellipse(width/3.2, height/3.2, width/16, height/16, 0, 0, Math.PI*2);
            ctx.ellipse(width - width/3.2, height/3.2, width/16, height/16, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = isBlack ? '#660000' : '#ff0000';
            ctx.beginPath();
            ctx.ellipse(width/2, height - height/4, width/6, height/8, 0, 0, Math.PI*2);
            ctx.fill();
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(width/2 + Math.sin(i) * width/2, height/2 + Math.cos(i*2) * height/2.5);
                ctx.lineTo(width/2 + Math.sin(i+0.5) * width/3, height/2 + Math.cos((i+0.5)*2) * height/3);
                ctx.lineTo(width/2 + Math.sin(i-0.5) * width/3, height/2 + Math.cos((i-0.5)*2) * height/3);
                ctx.fillStyle = isBlack ? '#440000' : '#aa2222';
                ctx.fill();
            }
            ctx.restore();
        }

        function drawPlayer() {
            let x = player.x, y = player.y;
            let blink = hitBlinkCounter > 0 && (Math.floor(hitBlinkCounter / 2) % 2 === 0);
            let bounce = Math.sin(Date.now() * 0.008) * 2;
            let jumpSquash = !player.grounded && player.vy < 0 ? 1.1 : (player.vy > 5 ? 0.9 : 1);
            
            ctx.save();
            if (blink) { ctx.globalAlpha = 0.4; ctx.shadowBlur = 20; ctx.shadowColor = '#ffffff'; }
            
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(x+24, y+50, 18, 6, 0, 0, Math.PI*2);
            ctx.fill();
            
            ctx.translate(x+24, y+27);
            ctx.scale(1, jumpSquash);
            ctx.translate(-(x+24), -(y+27));
            
            if (charImageLoaded) {
                ctx.drawImage(charImage, x, y + bounce, player.width, player.height);
            } else {
                ctx.fillStyle = '#3b82f6';
                ctx.fillRect(x, y, player.width, player.height);
            }
            
            ctx.restore();
        }

        function drawGround() {
            for (let seg of groundSegments) {
                let drawX = seg.x - worldOffset;
                ctx.fillStyle = '#1a2a3a';
                ctx.fillRect(drawX, seg.y, seg.w, 12);
                ctx.fillStyle = '#2a3a4a';
                ctx.fillRect(drawX, seg.y-4, seg.w, 5);
            }
        }

        function drawCollectibles() {
            for (let c of collectibles) {
                let floatY = Math.sin(Date.now() * 0.003 + c.floatOffset) * 3;
                drawInfinity(c.x, c.y + floatY, c.radius+1, c.value, true, '#3b82f6', '#3b82f6');
            }
        }

        function drawHealthItems() {
            for (let h of healthItems) {
                let floatY = Math.sin(Date.now() * 0.003 + h.floatOffset) * 3;
                drawGreenHealth(h.x, h.y + floatY, h.radius+1);
            }
        }

        function drawViruses() {
            for (let v of viruses) drawVirus(v.x, v.y, v.shake, false, v.deepRed, v.level4);
            for (let v of blackViruses) drawVirus(v.x, v.y, v.shake, true, false, v.level4);
        }

        let planetsQueue = [
            { x: -150, y: 140, size: 90, color1: '#3b82f6', color2: '#1e40af', ring: true, ringColor: '#60a5fa', active: true, alpha: 0.4 },
            { x: -150, y: 300, size: 105, color1: '#8b5cf6', color2: '#6d28d9', ring: false, active: false, alpha: 0.4 },
            { x: -150, y: 420, size: 80, color1: '#06b6d4', color2: '#0891b2', ring: true, ringColor: '#22d3ee', active: false, alpha: 0.4 },
            { x: -150, y: 520, size: 95, color1: '#6366f1', color2: '#4338ca', ring: false, active: false, alpha: 0.4 },
            { x: -150, y: 200, size: 85, color1: '#a855f7', color2: '#7e22ce', ring: true, ringColor: '#c084fc', active: false, alpha: 0.4 }
        ];
        let currentPlanetIndex = 0;
        let planetSpeed = 1.0;
        
        function updatePlanets() {
            let activePlanet = planetsQueue[currentPlanetIndex];
            if (activePlanet) {
                activePlanet.x += planetSpeed;
                if (activePlanet.x > W + 200) {
                    activePlanet.active = false;
                    activePlanet.x = -150;
                    currentPlanetIndex = (currentPlanetIndex + 1) % planetsQueue.length;
                    planetsQueue[currentPlanetIndex].active = true;
                    planetsQueue[currentPlanetIndex].x = -150;
                }
            }
        }
        
        function drawPlanets() {
            for (let p of planetsQueue) {
                if (!p.active) continue;
                ctx.save();
                ctx.shadowBlur = 20;
                ctx.shadowColor = p.color1;
                ctx.globalAlpha = p.alpha || 0.4;
                let grad = ctx.createLinearGradient(p.x - 20, p.y - 20, p.x + 20, p.y + 20);
                grad.addColorStop(0, p.color1);
                grad.addColorStop(1, p.color2);
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                if (p.ring) {
                    ctx.globalAlpha = (p.alpha || 0.4) * 0.7;
                    ctx.fillStyle = p.ringColor;
                    ctx.beginPath();
                    ctx.ellipse(p.x, p.y, p.size + 18, p.size * 0.25, Math.PI / 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = (p.alpha || 0.4) * 0.4;
                    ctx.beginPath();
                    ctx.ellipse(p.x, p.y, p.size + 28, p.size * 0.3, Math.PI / 4, 0, Math.PI * 2);
                    ctx.fill();
                }
                if (!p.ring) {
                    ctx.globalAlpha = (p.alpha || 0.4) * 0.6;
                    ctx.fillStyle = '#000000';
                    ctx.beginPath();
                    ctx.arc(p.x - 18, p.y - 12, p.size * 0.12, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(p.x + 15, p.y + 10, p.size * 0.1, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(p.x - 8, p.y + 18, p.size * 0.08, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        let stars = [];
        for (let i = 0; i < 150; i++) stars.push({ x: Math.random() * W, y: Math.random() * H, size: Math.random() * 2, alpha: 0.3 + Math.random() * 0.7 });
        let bgInfinity = [];
        for (let i = 0; i < 6; i++) bgInfinity.push({ x: Math.random() * W, y: 30 + Math.random() * 200, size: 20 + Math.random() * 15, speed: 0.05 + Math.random() * 0.1 });

        function drawBackground() {
            if (bgImageLoaded) {
                ctx.save();
                ctx.globalAlpha = 0.65;
                ctx.drawImage(bgImage, 0, 0, W, H);
                ctx.restore();
            } else {
                let grad = ctx.createLinearGradient(0, 0, 0, H);
                grad.addColorStop(0, '#0a0a2a');
                grad.addColorStop(0.5, '#15153a');
                grad.addColorStop(1, '#1a1a3a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);
            }
            
            for (let s of stars) {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                ctx.fillRect(s.x, s.y, s.size, s.size);
                s.x -= 0.1;
                if (s.x < 0) s.x = W;
            }
            drawPlanets();
            for (let b of bgInfinity) {
                ctx.save();
                ctx.globalAlpha = 0.15;
                ctx.shadowBlur = 8;
                drawInfinity(b.x, b.y, b.size, null, true, '#3b82f6', '#3b82f6');
                ctx.restore();
                b.x -= b.speed;
                if (b.x + b.size < 0) b.x = W + b.size;
            }
        }

        function gameOver() {
            if (!gameRunning) return;
            gameRunning = false;
            gameState = "gameOver";
            playSound('gameover');
            document.getElementById('finalScore').innerText = score.toLocaleString();
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('score').style.display = 'none';
            document.getElementById('healthBarContainer').style.display = 'none';
            document.getElementById('pauseBtn').style.display = 'none';
            document.getElementById('gameButtons').style.display = 'none';
            document.querySelector('.game-footer').style.display = 'none';
            document.getElementById('pauseOverlay').style.display = 'none';
            
            // Stop any ongoing movement
            if (moveInterval) {
                clearInterval(moveInterval);
                moveInterval = null;
            }
            leftPressed = false;
            rightPressed = false;
        }

        function restartGame() { startGame(); }
        function exitToMenu() { 
            gameState = "menu"; 
            gameRunning = false; 
            document.getElementById('score').style.display = 'none';
            document.getElementById('healthBarContainer').style.display = 'none';
            document.getElementById('pauseBtn').style.display = 'none';
            document.getElementById('gameButtons').style.display = 'none';
            document.querySelector('.game-footer').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('pauseOverlay').style.display = 'none';
            
            // Stop any ongoing movement
            if (moveInterval) {
                clearInterval(moveInterval);
                moveInterval = null;
            }
            leftPressed = false;
            rightPressed = false;
        }
        function claimGameOverIFC() { alert(`💰 TOTAL IFC EARNED: ${score.toLocaleString()} IFC\n🔧 Smart contract deployment coming soon!`); }

        function drawMenu() {
            let grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#0a0a2a');
            grad.addColorStop(0.5, '#15153a');
            grad.addColorStop(1, '#1a1a3a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
            
            for (let s of stars) {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha * 0.5})`;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            }
            
            ctx.font = 'bold 28px monospace';
            ctx.fillStyle = '#3b82f6';
            ctx.shadowBlur = 10;
            ctx.fillText('INFINITE JUMPER', W/2-115, H/4 - 10);
            
            ctx.font = '11px monospace';
            ctx.fillStyle = '#cbd5e1';
            ctx.fillText('COLLECT INFINITY COINS | AVOID VIRUSES', W/2-135, H/4 + 20);
            ctx.fillStyle = '#94a3b8';
            ctx.font = '10px monospace';
            ctx.fillText('DOUBLE JUMP | SURVIVE | EARN IFC', W/2-105, H/4 + 38);
            
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 0;
            ctx.fillRect(W/2-100, H/2 - 40, 200, 170);
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 2;
            ctx.strokeRect(W/2-100, H/2 - 40, 200, 170);
            
            ctx.fillStyle = dailyBonusAvailable ? '#f5a623' : '#3b82f6';
            ctx.fillRect(W/2-80, H/2 - 25, 160, 30);
            ctx.fillStyle = '#000000';
            ctx.font = 'bold 12px monospace';
            ctx.fillText(dailyBonusAvailable ? '🎁 DAILY BONUS' : '✓ BONUS CLAIMED', W/2-60, H/2 - 5);
            
            ctx.fillStyle = '#3b82f6';
            ctx.fillRect(W/2-80, H/2 + 15, 160, 32);
            ctx.fillStyle = '#000000';
            ctx.font = 'bold 13px monospace';
            ctx.fillText('▶ START GAME', W/2-55, H/2 + 36);
            
            ctx.fillStyle = '#3b82f6';
            ctx.fillRect(W/2-80, H/2 + 57, 160, 28);
            ctx.fillStyle = '#000000';
            ctx.font = 'bold 11px monospace';
            ctx.fillText('🔗 CONNECT WALLET', W/2-65, H/2 + 76);
            
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(W/2-50, H/2 + 95, 100, 24);
            ctx.fillStyle = '#3b82f6';
            ctx.font = '10px monospace';
            ctx.fillText(soundEnabled ? '🔊 SOUND ON' : '🔇 SOUND OFF', W/2-40, H/2 + 112);
            
            if (dailyBonusAvailable) {
                ctx.fillStyle = '#f5a623';
                ctx.font = 'bold 9px monospace';
                ctx.fillText('✦ BONUS READY ✦', W/2-42, H/2 - 32);
            }
        }

        function updateGame() { 
            if (gameState === "playing" && gameRunning && !paused) { 
                updateWorld(); 
                updatePlayer(); 
                updateCollectibles(); 
                updateGiftBox();
                updateHealthItems(); 
                updateViruses(); 
                updatePlanets();
            } 
        }
        
        function draw() {
            if (gameState === "menu") drawMenu();
            else { 
                drawBackground(); 
                drawGround(); 
                drawCollectibles(); 
                drawHealthItems(); 
                drawViruses(); 
                if (giftBox) drawGiftBox(giftBox.x, giftBox.y);
                drawPlayer(); 
            } 
        }
        
        function animate() { updateGame(); draw(); requestAnimationFrame(animate); }

        initGround();
        animate();

        canvas.addEventListener('click', (e) => { 
            if (gameState !== "menu") return; 
            const rect = canvas.getBoundingClientRect(); 
            const scaleX = canvas.width / rect.width; 
            const scaleY = canvas.height / rect.height; 
            let mouseX = (e.clientX - rect.left) * scaleX; 
            let mouseY = (e.clientY - rect.top) * scaleY; 
            if (mouseX > W/2-80 && mouseX < W/2+80 && mouseY > H/2-25 && mouseY < H/2+5 && dailyBonusAvailable) { 
                claimDailyBonus(); 
                drawMenu();
            } else if (mouseX > W/2-80 && mouseX < W/2+80 && mouseY > H/2+15 && mouseY < H/2+47) { 
                startGame(); 
            } else if (mouseX > W/2-80 && mouseX < W/2+80 && mouseY > H/2+57 && mouseY < H/2+85) { 
                connectWallet();
            } else if (mouseX > W/2-50 && mouseX < W/2+50 && mouseY > H/2+95 && mouseY < H/2+119) { 
                toggleSound(); 
                drawMenu();
            } 
        });
        
        canvas.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            if (gameState !== "menu") return; 
            const rect = canvas.getBoundingClientRect(); 
            const scaleX = canvas.width / rect.width; 
            const scaleY = canvas.height / rect.height; 
            const touch = e.touches[0]; 
            let touchX = (touch.clientX - rect.left) * scaleX; 
            let touchY = (touch.clientY - rect.top) * scaleY; 
            if (touchX > W/2-80 && touchX < W/2+80 && touchY > H/2-25 && touchY < H/2+5 && dailyBonusAvailable) { 
                claimDailyBonus(); 
                drawMenu();
            } else if (touchX > W/2-80 && touchX < W/2+80 && touchY > H/2+15 && touchY < H/2+47) { 
                startGame(); 
            } else if (touchX > W/2-80 && touchX < W/2+80 && touchY > H/2+57 && touchY < H/2+85) { 
                connectWallet();
            } else if (touchX > W/2-50 && touchX < W/2+50 && touchY > H/2+95 && touchY < H/2+119) { 
                toggleSound(); 
                drawMenu();
            } 
        });

        // Hold-to-move event listeners
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        
        leftBtn.addEventListener('mousedown', startMoveLeft);
        leftBtn.addEventListener('mouseup', stopMoveLeft);
        leftBtn.addEventListener('mouseleave', stopMoveLeft);
        leftBtn.addEventListener('touchstart', startMoveLeft);
        leftBtn.addEventListener('touchend', stopMoveLeft);
        leftBtn.addEventListener('touchcancel', stopMoveLeft);
        
        rightBtn.addEventListener('mousedown', startMoveRight);
        rightBtn.addEventListener('mouseup', stopMoveRight);
        rightBtn.addEventListener('mouseleave', stopMoveRight);
        rightBtn.addEventListener('touchstart', startMoveRight);
        rightBtn.addEventListener('touchend', stopMoveRight);
        rightBtn.addEventListener('touchcancel', stopMoveRight);
        
        document.getElementById('jumpBtn').addEventListener('click', (e) => { e.preventDefault(); jump(); });
        document.getElementById('jumpBtn').addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
        
        document.getElementById('gameoverRestartBtn').onclick = () => restartGame();
        document.getElementById('gameoverClaimBtn').onclick = () => claimGameOverIFC();
        document.getElementById('gameoverHomeBtn').onclick = () => exitToMenu();
        
        const pauseBtn = document.getElementById('pauseBtn');
        if (pauseBtn) {
            pauseBtn.onclick = (e) => { e.preventDefault(); togglePause(); };
            pauseBtn.ontouchstart = (e) => { e.preventDefault(); togglePause(); };
        }
        
        document.getElementById('resumeBtn').onclick = () => { togglePause(); };
        document.getElementById('pauseRestartBtn').onclick = () => { if (gameState === "playing") { restartGame(); paused = false; document.getElementById('pauseOverlay').style.display = 'none'; } };
        document.getElementById('exitMenuBtn').onclick = () => { exitToMenu(); paused = false; document.getElementById('pauseOverlay').style.display = 'none'; };
        document.getElementById('claimBtn').onclick = () => alert('🔧 SMART CONTRACT DEPLOYMENT SOON');
        document.getElementById('pauseSoundToggle').onclick = () => { toggleSound(); };
        
        window.onkeydown = (e) => { 
            if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); if (gameState === "playing" && !paused) jump(); } 
            if (e.code === 'ArrowLeft') { e.preventDefault(); if (gameState === "playing" && !paused) startMoveLeft(); }
            if (e.code === 'ArrowRight') { e.preventDefault(); if (gameState === "playing" && !paused) startMoveRight(); }
            if (e.code === 'KeyP' && gameState === "playing") togglePause(); 
            if (e.code === 'KeyM') { toggleSound(); if (gameState === "menu") drawMenu(); }
        };
        
        window.onkeyup = (e) => {
            if (e.code === 'ArrowLeft') { stopMoveLeft(); }
            if (e.code === 'ArrowRight') { stopMoveRight(); }
        };
        
        checkDailyBonus();
    })();
</script>
</body>
</html>
