<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Infinitecoin Jumper - Infinite Difficulty</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a2a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
        }
        .game-container {
            position: relative;
            width: 100%;
            max-width: 480px;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 24px;
            cursor: pointer;
        }
        #score {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 40px;
            color: #3b82f6;
            font-weight: bold;
            font-size: 22px;
            z-index: 10;
            border: 1px solid #3b82f6;
            display: none;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 20;
            display: none;
        }
        .ctrl-btn {
            background: rgba(0,0,0,0.7);
            border: 2px solid #3b82f6;
            color: #3b82f6;
            font-size: 24px;
            font-weight: bold;
            padding: 10px 28px;
            border-radius: 60px;
            cursor: pointer;
            backdrop-filter: blur(8px);
        }
        .ctrl-btn:active {
            background: #3b82f6;
            color: #000;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            padding: 25px 35px;
            border-radius: 32px;
            text-align: center;
            z-index: 30;
            display: none;
            border: 1px solid #3b82f6;
        }
        #gameOver h2 {
            color: #3b82f6;
            margin-bottom: 15px;
        }
        #gameOver p {
            color: white;
            font-size: 22px;
            margin-bottom: 20px;
        }
        #restartBtn {
            background: #3b82f6;
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .game-footer {
            position: absolute;
            bottom: -28px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            color: #3b82f6;
            display: none;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div id="score">♾️ IFC: 0</div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div id="controls"><button class="ctrl-btn" id="jumpBtn">▲ JUMP</button></div>
    <div id="gameOver"><h2>✦ GAME OVER ✦</h2><p>♾️ IFC: <span id="finalScore">0</span></p><button id="restartBtn">RESTART</button></div>
    <div class="game-footer">♾️ INFINITE COIN | COLLECT ∞ | AVOID VIRUSES | DOUBLE JUMP</div>
</div>
<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 400, H = 600;
        canvas.width = W;
        canvas.height = H;

        // Game state
        let gameState = "menu"; // menu, playing, gameOver
        let gameRunning = false;
        let score = 0;
        let worldOffset = 0;
        let currentSpeed = 2.5;
        let frame = 0;
        let hitBlinkCounter = 0;
        let difficultyTier = 0; // 0 = normal, 1 = hard (after 1000 IFC)

        // Player
        let player = { x: 100, y: 0, vy: 0, width: 28, height: 36, grounded: false, doubleJumpUsed: false };

        // Ground
        let groundSegments = [];
        const GROUND_Y = H - 60;
        const SEGMENT_WIDTH = 60;

        function initGround() {
            groundSegments = [];
            for (let i = 0; i < 20; i++) {
                groundSegments.push({ x: i * SEGMENT_WIDTH, y: GROUND_Y, w: SEGMENT_WIDTH });
            }
        }

        // Collectibles and viruses
        let collectibles = [];
        let viruses = [];

        function getCoinValue() {
            if (difficultyTier >= 1) {
                return Math.floor(Math.random() * 21) + 10; // 10-30 IFC
            }
            return Math.floor(Math.random() * 16) + 5; // 5-20 IFC
        }

        function spawnCollectible() {
            let x = 250 + Math.random() * 200;
            let y = GROUND_Y - 40 - Math.random() * 50;
            let value = getCoinValue();
            collectibles.push({ x: x, y: y, radius: 11, value: value, collected: false, floatOffset: Math.random() * Math.PI * 2 });
        }

        function spawnVirus() {
            let x = 300 + Math.random() * 250;
            viruses.push({ x: x, y: GROUND_Y - 18, width: 18, height: 20, active: false, shake: 0 });
        }

        function spawnDoubleVirus() {
            let x1 = 300 + Math.random() * 200;
            let x2 = x1 + 40 + Math.random() * 60;
            viruses.push({ x: x1, y: GROUND_Y - 18, width: 18, height: 20, active: false, shake: 0 });
            viruses.push({ x: x2, y: GROUND_Y - 18, width: 18, height: 20, active: false, shake: 0 });
        }

        let spawnInterval, virusInterval;

        function startGame() {
            gameState = "playing";
            gameRunning = true;
            score = 0;
            currentSpeed = 2.5;
            worldOffset = 0;
            hitBlinkCounter = 0;
            difficultyTier = 0;
            collectibles = [];
            viruses = [];
            initGround();
            player.y = GROUND_Y - player.height;
            player.vy = 0;
            player.grounded = true;
            player.doubleJumpUsed = false;
            player.x = 100;
            
            document.getElementById('score').style.display = 'block';
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('gameOver').style.display = 'none';
            document.querySelector('.game-footer').style.display = 'block';
            document.getElementById('score').innerHTML = '♾️ IFC: 0';
            
            for (let i = 0; i < 4; i++) setTimeout(() => spawnCollectible(), i * 300);
            for (let i = 0; i < 2; i++) setTimeout(() => spawnVirus(), i * 800);
            
            if (spawnInterval) clearInterval(spawnInterval);
            if (virusInterval) clearInterval(virusInterval);
            spawnInterval = setInterval(() => { if (gameRunning && collectibles.length < 6) spawnCollectible(); }, 1800);
            virusInterval = setInterval(() => { 
                if (gameRunning && viruses.length < 3) {
                    if (difficultyTier >= 1) {
                        spawnDoubleVirus();
                    } else {
                        spawnVirus();
                    }
                }
            }, 2500);
        }

        function updateCollectibles() {
            for (let i = 0; i < collectibles.length; i++) {
                let c = collectibles[i];
                c.x -= currentSpeed;
                if (!c.collected && player.x < c.x + c.radius && player.x + player.width > c.x - c.radius && player.y < c.y + c.radius && player.y + player.height > c.y - c.radius) {
                    c.collected = true;
                    score += c.value;
                    document.getElementById('score').innerHTML = `♾️ IFC: ${score}`;
                    
                    // Check for difficulty increase at 1000 IFC
                    if (score >= 1000 && difficultyTier === 0) {
                        difficultyTier = 1;
                        currentSpeed = 4.0; // Increase speed
                    }
                    
                    // Progressive speed based on score
                    if (difficultyTier === 1) {
                        currentSpeed = 4.0 + Math.floor((score - 1000) / 500) * 0.3;
                        if (currentSpeed > 6.5) currentSpeed = 6.5;
                    } else {
                        currentSpeed = 2.5 + Math.floor(score / 50) * 0.3;
                        if (currentSpeed > 5.5) currentSpeed = 5.5;
                    }
                }
                if (c.x + c.radius < 0 || c.collected) { collectibles.splice(i, 1); i--; }
            }
        }

        function updateViruses() {
            for (let i = 0; i < viruses.length; i++) {
                let v = viruses[i];
                v.x -= currentSpeed;
                v.shake = Math.sin(Date.now() * 0.015 + i) * 2;
                if (!v.active && player.x < v.x + v.width && player.x + player.width > v.x && player.y + player.height > v.y && player.y < v.y + v.height) {
                    v.active = true;
                    score = Math.max(0, score - 10);
                    document.getElementById('score').innerHTML = `♾️ IFC: ${score}`;
                    hitBlinkCounter = 14;
                }
                if (v.x + v.width < 0) { viruses.splice(i, 1); i--; }
            }
        }

        function updatePlayer() {
            player.vy += 0.65;
            player.y += player.vy;
            player.grounded = false;
            for (let seg of groundSegments) {
                let worldX = seg.x - worldOffset;
                if (player.x + player.width > worldX && player.x < worldX + seg.w && player.y + player.height > seg.y && player.y + player.height < seg.y + 15) {
                    player.y = seg.y - player.height;
                    player.vy = 0;
                    player.grounded = true;
                    player.doubleJumpUsed = false;
                    break;
                }
            }
            if (player.x < 30) player.x = 30;
            if (player.x + player.width > W - 30) player.x = W - 30 - player.width;
            if (player.y > H + 50) gameOver();
            if (hitBlinkCounter > 0) hitBlinkCounter--;
        }

        function jump() {
            if (!gameRunning) return;
            if (player.grounded) { 
                player.vy = -9.5; 
                player.grounded = false; 
            } else if (!player.doubleJumpUsed) { 
                player.vy = -9.0; 
                player.doubleJumpUsed = true; 
            }
        }

        function updateWorld() {
            worldOffset += currentSpeed;
            if (groundSegments[0].x - worldOffset + groundSegments[0].w < 0) {
                groundSegments.shift();
                let lastX = groundSegments[groundSegments.length-1].x;
                groundSegments.push({ x: lastX + SEGMENT_WIDTH, y: GROUND_Y, w: SEGMENT_WIDTH });
            }
        }

        function drawInfinity(x, y, size, value, isGlowing = true, color = '#3b82f6', shadowColor = '#3b82f6') {
            ctx.save();
            ctx.translate(x, y);
            if (isGlowing) {
                ctx.shadowBlur = 15;
                ctx.shadowColor = shadowColor;
            }
            ctx.beginPath();
            ctx.ellipse(-size*0.4, 0, size*0.4, size*0.25, 0, 0, Math.PI*2);
            ctx.ellipse(size*0.4, 0, size*0.4, size*0.25, 0, 0, Math.PI*2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.ellipse(-size*0.4, 0, size*0.2, size*0.12, 0, 0, Math.PI*2);
            ctx.ellipse(size*0.4, 0, size*0.2, size*0.12, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            ctx.restore();
            if (value) {
                ctx.font = `bold ${size-2}px monospace`;
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 4;
                ctx.shadowColor = shadowColor;
                ctx.fillText(`+${value}`, x-10, y-15);
                ctx.shadowBlur = 0;
            }
        }

        function drawVirus(x, y, shake) {
            ctx.save();
            ctx.translate(x + shake, y);
            ctx.fillStyle = '#8b0000';
            ctx.beginPath();
            ctx.arc(9, 10, 9, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.arc(9, 10, 6, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(6, 7, 2, 0, Math.PI*2);
            ctx.arc(12, 7, 2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(5.5, 6.5, 1, 0, Math.PI*2);
            ctx.arc(11.5, 6.5, 1, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.ellipse(9, 13, 3, 2, 0, 0, Math.PI*2);
            ctx.fill();
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(9 + Math.sin(i) * 12, 10 + Math.cos(i*2) * 8);
                ctx.lineTo(9 + Math.sin(i+0.5) * 6, 10 + Math.cos((i+0.5)*2) * 4);
                ctx.lineTo(9 + Math.sin(i-0.5) * 6, 10 + Math.cos((i-0.5)*2) * 4);
                ctx.fillStyle = '#aa2222';
                ctx.fill();
            }
            ctx.restore();
        }

        function drawPlayer() {
            let x = player.x, y = player.y;
            let legOffset = Math.sin(Date.now() * 0.012) * 4;
            let armOffset = Math.sin(Date.now() * 0.015) * 5;
            let orbRotate = Date.now() * 0.008;
            let blink = hitBlinkCounter > 0 && (Math.floor(hitBlinkCounter / 2) % 2 === 0);
            
            ctx.save();
            if (blink) {
                ctx.globalAlpha = 0.4;
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ffffff';
            }
            
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(x+14, y+42, 12, 5, 0, 0, Math.PI*2);
            ctx.fill();
            
            ctx.fillStyle = '#1a5a8a';
            ctx.fillRect(x+5, y+28, 7, 12 + legOffset);
            ctx.fillRect(x+18, y+28 - legOffset, 7, 12 + legOffset);
            
            ctx.fillStyle = '#0a2a4a';
            ctx.fillRect(x+3, y+38, 9, 6);
            ctx.fillRect(x+18, y+38, 9, 6);
            
            let gradBody = ctx.createLinearGradient(x+5, y+12, x+23, y+32);
            gradBody.addColorStop(0, '#3b82f6');
            gradBody.addColorStop(1, '#1a4a8a');
            ctx.fillStyle = gradBody;
            ctx.fillRect(x+5, y+12, 20, 24);
            
            drawInfinity(x+15, y+24, 9, null, true, '#3b82f6', '#3b82f6');
            
            ctx.fillStyle = '#3b82f6';
            ctx.fillRect(x-3 + armOffset, y+18, 8, 10);
            ctx.fillRect(x+25 - armOffset, y+18, 8, 10);
            
            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#3b82f6';
            ctx.beginPath();
            ctx.arc(x-6 + armOffset + Math.sin(orbRotate) * 3, y+23, 7, 0, Math.PI*2);
            ctx.fillStyle = '#3b82f6';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x+28 - armOffset + Math.cos(orbRotate) * 3, y+23, 7, 0, Math.PI*2);
            ctx.fill();
            drawInfinity(x-6 + armOffset + Math.sin(orbRotate) * 3, y+23, 6, null, true, '#3b82f6', '#3b82f6');
            drawInfinity(x+28 - armOffset + Math.cos(orbRotate) * 3, y+23, 6, null, true, '#3b82f6', '#3b82f6');
            ctx.restore();
            
            drawInfinity(x+15, y+6, 16, null, true, '#3b82f6', '#3b82f6');
            
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#3b82f6';
            ctx.beginPath();
            ctx.ellipse(x+8, y+2, 4, 5, 0, 0, Math.PI*2);
            ctx.ellipse(x+22, y+2, 4, 5, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#3b82f6';
            ctx.beginPath();
            ctx.ellipse(x+8, y+2, 2.5, 3, 0, 0, Math.PI*2);
            ctx.ellipse(x+22, y+2, 2.5, 3, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(x+7, y+1, 1.2, 0, Math.PI*2);
            ctx.arc(x+21, y+1, 1.2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(x+5, y-1, 0.8, 0, Math.PI*2);
            ctx.arc(x+19, y-1, 0.8, 0, Math.PI*2);
            ctx.fill();
            
            ctx.restore();
        }

        function drawGround() {
            for (let seg of groundSegments) {
                let drawX = seg.x - worldOffset;
                ctx.fillStyle = '#1a2a3a';
                ctx.fillRect(drawX, seg.y, seg.w, 12);
                ctx.fillStyle = '#2a3a4a';
                ctx.fillRect(drawX, seg.y-4, seg.w, 5);
            }
        }

        function drawCollectibles() {
            for (let c of collectibles) {
                let floatY = Math.sin(Date.now() * 0.003 + c.floatOffset) * 3;
                drawInfinity(c.x, c.y + floatY, c.radius+1, c.value, true, '#3b82f6', '#3b82f6');
            }
        }

        function drawViruses() {
            for (let v of viruses) {
                drawVirus(v.x, v.y, v.shake);
            }
        }

        let stars = [];
        for (let i = 0; i < 150; i++) {
            stars.push({ x: Math.random() * W, y: Math.random() * H, size: Math.random() * 2, alpha: 0.3 + Math.random() * 0.7 });
        }
        
        let bgInfinity = [];
        for (let i = 0; i < 10; i++) {
            bgInfinity.push({ x: Math.random() * W, y: 30 + Math.random() * 200, size: 25 + Math.random() * 20, speed: 0.05 + Math.random() * 0.15 });
        }

        function drawBackground() {
            let grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#0a0a2a');
            grad.addColorStop(0.5, '#15153a');
            grad.addColorStop(1, '#1a1a3a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
            
            for (let s of stars) {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                ctx.fillRect(s.x, s.y, s.size, s.size);
                s.x -= 0.1;
                if (s.x < 0) s.x = W;
            }
            
            ctx.save();
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#a855f7';
            ctx.globalAlpha = 0.8;
            drawInfinity(W/2, H/3, 55, null, true, '#a855f7', '#a855f7');
            ctx.restore();
            
            for (let b of bgInfinity) {
                ctx.save();
                ctx.globalAlpha = 0.2;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#3b82f6';
                drawInfinity(b.x, b.y, b.size, null, true, '#3b82f6', '#3b82f6');
                ctx.restore();
                b.x -= b.speed;
                if (b.x + b.size < 0) b.x = W + b.size;
            }
        }

        function gameOver() {
            if (!gameRunning) return;
            gameRunning = false;
            gameState = "gameOver";
            document.getElementById('finalScore').innerText = score;
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('score').style.display = 'none';
            document.getElementById('controls').style.display = 'none';
            document.querySelector('.game-footer').style.display = 'none';
        }

        function restartGame() {
            startGame();
        }

        function drawMenu() {
            drawBackground();
            
            ctx.font = 'bold 26px monospace';
            ctx.fillStyle = '#3b82f6';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#3b82f6';
            ctx.fillText('INFINITE JUMPER', W/2-120, H/3);
            
            drawInfinity(W/2, H/3 + 50, 35, null, true, '#a855f7', '#a855f7');
            
            ctx.font = '12px monospace';
            ctx.fillStyle = '#ffffff';
            ctx.fillText('TAP or SPACE / UP to JUMP', W/2-100, H/2 + 30);
            ctx.fillText('DOUBLE JUMP in AIR', W/2-80, H/2 + 55);
            ctx.fillText('REACH 1000 IFC for HARD MODE', W/2-110, H/2 + 80);
            ctx.fillText('2 VIRUSES + HIGHER REWARDS', W/2-105, H/2 + 95);
            
            ctx.fillStyle = '#3b82f6';
            ctx.shadowBlur = 8;
            ctx.fillRect(W/2-60, H/2 + 120, 120, 40);
            ctx.fillStyle = '#000000';
            ctx.font = 'bold 16px monospace';
            ctx.fillText('START', W/2-25, H/2 + 148);
            ctx.shadowBlur = 0;
            
            canvas.onclick = (e) => {
                if (gameState !== "menu") return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let mouseX = (e.clientX - rect.left) * scaleX;
                let mouseY = (e.clientY - rect.top) * scaleY;
                if (mouseX > W/2-60 && mouseX < W/2+60 && mouseY > H/2+120 && mouseY < H/2+160) {
                    startGame();
                    canvas.onclick = null;
                }
            };
        }

        function updateGame() {
            if (gameState === "playing" && gameRunning) {
                updateWorld();
                updatePlayer();
                updateCollectibles();
                updateViruses();
            }
            frame++;
        }

        function draw() {
            if (gameState === "menu") {
                drawMenu();
            } else {
                drawBackground();
                drawGround();
                drawCollectibles();
                drawViruses();
                drawPlayer();
                if (gameState === "playing") {
                    ctx.font = 'bold 10px monospace';
                    ctx.fillStyle = '#3b82f6';
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = '#3b82f6';
                    ctx.fillText('✦ COLLECT INFINITE SAMPLES ✦', W/2-105, 30);
                    if (difficultyTier >= 1) {
                        ctx.fillStyle = '#ff4444';
                        ctx.fillText('⚡ HARD MODE ⚡', W/2-55, 55);
                    }
                    ctx.shadowBlur = 0;
                }
            }
        }

        function animate() { updateGame(); draw(); requestAnimationFrame(animate); }

        initGround();
        animate();

        document.getElementById('jumpBtn').onclick = (e) => { e.preventDefault(); if (gameState === "playing") jump(); };
        document.getElementById('restartBtn').onclick = () => { restartGame(); };
        window.onkeydown = (e) => { 
            if (e.code === 'Space' || e.code === 'ArrowUp') { 
                e.preventDefault(); 
                if (gameState === "playing") jump(); 
            } 
        };
        canvas.ontouchstart = (e) => { 
            e.preventDefault(); 
            if (gameState === "playing") jump(); 
        };
        canvas.onmousedown = (e) => { 
            e.preventDefault(); 
            if (gameState === "playing") jump(); 
        };
    })();
</script>
</body>
</html>
