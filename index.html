<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Infinitecoin Jumper - Final</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
        body{background:#0a0a2a;min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:monospace;touch-action:manipulation}
        .game-container{position:relative;width:100%;max-width:480px;margin:0 auto}
        canvas{display:block;width:100%;height:auto;border-radius:24px;cursor:pointer;touch-action:manipulation}
        #score{position:absolute;top:15px;left:15px;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);padding:6px 14px;border-radius:40px;color:#3b82f6;font-weight:bold;font-size:18px;z-index:10;border:1px solid #3b82f6;display:none}
        .top-text{position:absolute;top:15px;left:120px;right:120px;text-align:center;z-index:10;pointer-events:none;display:none}
        .top-text .lavish{color:#f5a623;font-size:9px;font-weight:bold;letter-spacing:1px}
        .top-text .momentum{color:#3b82f6;font-size:7px;margin-top:2px}
        #healthBarContainer{position:absolute;top:15px;left:50%;transform:translateX(-50%);width:120px;height:12px;background:rgba(0,0,0,0.6);border-radius:20px;z-index:10;display:none;overflow:hidden;border:1px solid #3b82f6}
        #healthBar{width:100%;height:100%;background:#00ff00;transition:width 0.2s ease}
        #pauseBtn{position:absolute;top:15px;right:15px;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);padding:4px 12px;border-radius:40px;color:#3b82f6;font-weight:bold;font-size:14px;z-index:10;border:1px solid #3b82f6;cursor:pointer;display:none}
        .ctrl-btn{position:absolute;bottom:-50px;left:50%;transform:translateX(-50%);background:rgba(59,130,246,0.3);border:3px solid #3b82f6;color:#3b82f6;font-weight:bold;cursor:pointer;backdrop-filter:blur(8px);z-index:20;display:none;touch-action:manipulation;font-size:32px;padding:10px 28px;border-radius:60px;width:auto;text-align:center;box-shadow:0 0 15px rgba(59,130,246,0.3)}
        .ctrl-btn:active{background:#3b82f6;color:#000;transform:translateX(-50%) scale(0.96)}
        #gameOver{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.95);backdrop-filter:blur(10px);padding:25px 35px;border-radius:32px;text-align:center;z-index:30;display:none;border:1px solid #3b82f6}
        #gameOver h2{color:#3b82f6;margin-bottom:15px}
        #gameOver p{color:white;font-size:22px;margin-bottom:20px}
        .gameover-buttons{display:flex;flex-direction:column;gap:10px;margin-top:10px}
        .gameover-btn{background:#3b82f6;border:none;padding:10px 20px;border-radius:40px;font-size:16px;font-weight:bold;cursor:pointer;margin:3px 0}
        .gameover-btn:active{transform:scale(0.96)}
        .game-footer{position:absolute;bottom:-28px;left:0;right:0;text-align:center;font-size:10px;color:#3b82f6;display:none}
        #pauseOverlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);border-radius:24px;z-index:25;display:none;flex-direction:column;justify-content:center;align-items:center;gap:20px}
        #pauseOverlay .pause-title{color:#3b82f6;font-size:28px;font-weight:bold;margin-bottom:10px}
        #pauseOverlay .pause-stats{color:white;font-size:18px;text-align:center;margin-bottom:10px}
        #pauseOverlay .pause-stats span{color:#3b82f6;font-weight:bold}
        .pause-btn-custom{background:rgba(59,130,246,0.2);border:2px solid #3b82f6;color:#3b82f6;padding:10px 30px;border-radius:50px;font-size:18px;font-weight:bold;cursor:pointer;margin:5px;min-width:160px;text-align:center}
        .pause-btn-custom:active{background:#3b82f6;color:#000;transform:scale(0.96)}
        .pause-buttons-row{display:flex;flex-direction:column;gap:12px;align-items:center}
        .sound-btn{background:rgba(0,0,0,0.6);border:1px solid #3b82f6;color:#3b82f6;padding:6px 12px;border-radius:40px;font-size:12px;cursor:pointer;margin-top:10px}
        .sound-btn:active{background:#3b82f6;color:#000}
    </style>
</head>
<body>
<div class="game-container">
    <div id="score">♾️ IFC: 0</div>
    <div class="top-text" id="topText">
        <div class="lavish">LAVISH NEO</div>
        <div class="momentum">INFINITE MOMENTUM</div>
    </div>
    <div id="healthBarContainer"><div id="healthBar"></div></div>
    <div id="pauseBtn">⏸️ PAUSE</div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <button class="ctrl-btn" id="jumpBtn">♾️</button>
    <div id="pauseOverlay">
        <div class="pause-title">⏸️ GAME PAUSED</div>
        <div class="pause-stats">💰 CURRENT IFC: <span id="pauseCurrentScore">0</span></div>
        <div class="pause-stats">🏆 HIGH SCORE: <span id="pauseHighScore">0</span></div>
        <div class="pause-buttons-row">
            <div class="pause-btn-custom" id="claimBtn">🔧 SMART CONTRACT DEPLOYMENT SOON</div>
            <div class="pause-btn-custom" id="resumeBtn">▶️ RESUME</div>
            <div class="pause-btn-custom" id="pauseRestartBtn">🔄 RESTART</div>
            <div class="pause-btn-custom" id="exitMenuBtn">🏠 EXIT TO MENU</div>
            <div class="sound-btn" id="pauseSoundToggle">🔊 SOUND ON</div>
        </div>
    </div>
    <div id="gameOver">
        <h2>✦ GAME OVER ✦</h2>
        <p>♾️ IFC: <span id="finalScore">0</span></p>
        <div class="gameover-buttons">
            <button class="gameover-btn" id="gameoverRestartBtn">🔄 RESTART</button>
            <button class="gameover-btn" id="gameoverClaimBtn">💰 CLAIM IFC</button>
            <button class="gameover-btn" id="gameoverHomeBtn">🏠 RETURN HOME</button>
        </div>
    </div>
    <div class="game-footer">♾️ INFINITE COIN | COLLECT ∞ | AVOID VIRUSES | DOUBLE JUMP</div>
</div>
<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 400, H = 600;
        canvas.width = W;
        canvas.height = H;

        let soundEnabled = true;
        let audioContext = null;
        
        function initAudio() {
            if (!audioContext && (window.AudioContext || window.webkitAudioContext)) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playSound(type) {
            if (!soundEnabled || !audioContext) return;
            try {
                const now = audioContext.currentTime;
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.type = 'sine';
                gain.gain.value = 0.15;
                
                if (type === 'jump') {
                    osc.frequency.value = 523.25;
                    gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.3);
                    osc.start();
                    osc.stop(now + 0.3);
                } else if (type === 'collect') {
                    osc.frequency.value = 880;
                    gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.2);
                    osc.start();
                    osc.stop(now + 0.2);
                    setTimeout(() => {
                        const osc2 = audioContext.createOscillator();
                        const gain2 = audioContext.createGain();
                        osc2.connect(gain2);
                        gain2.connect(audioContext.destination);
                        osc2.frequency.value = 1046.5;
                        gain2.gain.value = 0.1;
                        gain2.gain.exponentialRampToValueAtTime(0.00001, now + 0.2);
                        osc2.start();
                        osc2.stop(now + 0.2);
                    }, 50);
                } else if (type === 'hit') {
                    osc.frequency.value = 130.81;
                    gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.4);
                    osc.start();
                    osc.stop(now + 0.4);
                } else if (type === 'gameover') {
                    osc.frequency.value = 98;
                    gain.gain.exponentialRampToValueAtTime(0.00001, now + 1);
                    osc.start();
                    osc.stop(now + 1);
                } else if (type === 'bonus') {
                    osc.frequency.value = 1318.52;
                    gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.5);
                    osc.start();
                    osc.stop(now + 0.5);
                    setTimeout(() => {
                        const osc2 = audioContext.createOscillator();
                        const gain2 = audioContext.createGain();
                        osc2.connect(gain2);
                        gain2.connect(audioContext.destination);
                        osc2.frequency.value = 1567.98;
                        gain2.gain.value = 0.12;
                        gain2.gain.exponentialRampToValueAtTime(0.00001, now + 0.5);
                        osc2.start();
                        osc2.stop(now + 0.5);
                    }, 100);
                }
            } catch(e) { console.log('Audio error'); }
        }
        
        function toggleSound() {
            soundEnabled = !soundEnabled;
            const pauseSoundBtn = document.getElementById('pauseSoundToggle');
            if (pauseSoundBtn) pauseSoundBtn.innerText = soundEnabled ? '🔊 SOUND ON' : '🔇 SOUND OFF';
            if (soundEnabled && audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        let gameState = "menu";
        let gameRunning = false;
        let paused = false;
        let score = 0;
        let health = 100;
        let worldOffset = 0;
        let currentSpeed = 2.5;
        let hitBlinkCounter = 0;
        let difficultyTier = 0;
        let virusCount = 0;
        let consecutiveDodges = 0;
        let giftBoxSpawned = false;
        let highScore = localStorage.getItem('infiniteJumperHighScore') || 0;
        let virusSpawnEnabled = true;
        let safeModeTimer = 0;
        let safeModeActive = false;
        
        let giftBox = null;
        
        function spawnGiftBox() {
            giftBox = {
                x: 350 + Math.random() * 150,
                y: GROUND_Y - 60 - Math.random() * 50,
                width: 20,
                height: 20,
                collected: false
            };
            giftBoxSpawned = true;
        }
        
        function startSafeMode(seconds) {
            safeModeActive = true;
            virusSpawnEnabled = false;
            safeModeTimer = seconds;
            
            const interval = setInterval(() => {
                if (!safeModeActive || gameState !== "playing") {
                    clearInterval(interval);
                    return;
                }
                safeModeTimer--;
                if (safeModeTimer <= 0) {
                    safeModeActive = false;
                    virusSpawnEnabled = true;
                    clearInterval(interval);
                }
            }, 1000);
        }
        
        let lastPlayed = localStorage.getItem('lastPlayedDate') || 0;
        let dailyBonusAvailable = false;
        let dailyBonusClaimed = false;
        
        function checkDailyBonus() {
            const today = new Date().toDateString();
            const last = localStorage.getItem('lastPlayedDate');
            if (last !== today) {
                dailyBonusAvailable = true;
                dailyBonusClaimed = false;
            } else {
                dailyBonusAvailable = false;
                dailyBonusClaimed = true;
            }
        }
        
        function claimDailyBonus() {
            if (!dailyBonusAvailable) return false;
            const bonus = 500;
            score += bonus;
            updateUI();
            dailyBonusAvailable = false;
            dailyBonusClaimed = true;
            localStorage.setItem('lastPlayedDate', new Date().toDateString());
            alert(`✦ DAILY BONUS CLAIMED! +${bonus} IFC ✦`);
            return true;
        }

        let player = { x: 100, y: 0, vy: 0, width: 28, height: 36, grounded: false, doubleJumpUsed: false, baseJump: -9.5 };

        let groundSegments = [];
        const GROUND_Y = H - 60;
        const SEGMENT_WIDTH = 60;

        function initGround() {
            groundSegments = [];
            for (let i = 0; i < 20; i++) {
                groundSegments.push({ x: i * SEGMENT_WIDTH, y: GROUND_Y, w: SEGMENT_WIDTH });
            }
        }

        let collectibles = [];
        let viruses = [];
        let blackViruses = [];
        let healthItems = [];

        function getCoinValue() {
            if (difficultyTier >= 2) return Math.floor(Math.random() * 61) + 40;
            if (difficultyTier >= 1) return Math.floor(Math.random() * 21) + 10;
            return Math.floor(Math.random() * 16) + 5;
        }

        function spawnCollectible() {
            let x = 250 + Math.random() * 200;
            let y = GROUND_Y - 40 - Math.random() * 50;
            let value = getCoinValue();
            collectibles.push({ x: x, y: y, radius: 11, value: value, collected: false, floatOffset: Math.random() * Math.PI * 2 });
        }

        function spawnVirus(isBlack = false) {
            if (!virusSpawnEnabled) return;
            if (isBlack) {
                blackViruses.push({ x: 350 + Math.random() * 200, y: GROUND_Y - 22, width: 24, height: 26, active: false, shake: 0 });
            } else {
                viruses.push({ x: 350 + Math.random() * 200, y: GROUND_Y - 18, width: 18, height: 20, active: false, shake: 0 });
            }
        }

        function spawnClusteredViruses(count, isBlack = false) {
            if (!virusSpawnEnabled) return;
            let baseX = 350 + Math.random() * 150;
            let spacing = isBlack ? 38 : 28;
            for (let i = 0; i < count; i++) {
                if (isBlack) {
                    blackViruses.push({ x: baseX + (i * spacing), y: GROUND_Y - 22, width: 24, height: 26, active: false, shake: 0 });
                } else {
                    viruses.push({ x: baseX + (i * spacing), y: GROUND_Y - 18, width: 18, height: 20, active: false, shake: 0 });
                }
            }
        }

        function spawnHealthItem() {
            let x = 350 + Math.random() * 180;
            let y = GROUND_Y - 55 - Math.random() * 40;
            healthItems.push({ x: x, y: y, radius: 12, collected: false, floatOffset: Math.random() * Math.PI * 2 });
        }

        let spawnInterval, virusInterval;

        function updateUI() {
            document.getElementById('score').innerHTML = `♾️ IFC: ${score}`;
            let healthPercent = Math.max(0, health);
            document.getElementById('healthBar').style.width = `${healthPercent}%`;
            let hue = (healthPercent / 100) * 120;
            document.getElementById('healthBar').style.background = `hsl(${hue}, 100%, 50%)`;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('infiniteJumperHighScore', highScore);
            }
        }

        function startGame() {
            initAudio();
            if (audioContext && audioContext.state === 'suspended') audioContext.resume();
            gameState = "playing";
            gameRunning = true;
            paused = false;
            score = 0;
            health = 100;
            currentSpeed = 2.5;
            worldOffset = 0;
            hitBlinkCounter = 0;
            difficultyTier = 0;
            virusCount = 0;
            consecutiveDodges = 0;
            giftBoxSpawned = false;
            giftBox = null;
            collectibles = [];
            viruses = [];
            blackViruses = [];
            healthItems = [];
            player.baseJump = -9.5;
            initGround();
            player.y = GROUND_Y - player.height;
            player.vy = 0;
            player.grounded = true;
            player.doubleJumpUsed = false;
            player.x = 100;
            
            document.getElementById('score').style.display = 'block';
            document.getElementById('topText').style.display = 'block';
            document.getElementById('healthBarContainer').style.display = 'block';
            document.getElementById('pauseBtn').style.display = 'block';
            document.getElementById('jumpBtn').style.display = 'block';
            document.getElementById('gameOver').style.display = 'none';
            document.querySelector('.game-footer').style.display = 'block';
            document.getElementById('pauseOverlay').style.display = 'none';
            updateUI();
            
            for (let i = 0; i < 6; i++) setTimeout(() => spawnCollectible(), i * 200);
            
            if (spawnInterval) clearInterval(spawnInterval);
            if (virusInterval) clearInterval(virusInterval);
            spawnInterval = setInterval(() => { if (gameRunning && !paused && collectibles.length < 8) spawnCollectible(); }, 1600);
            
            startSafeMode(5);
            
            virusInterval = setInterval(() => { 
                if (gameRunning && !paused && virusSpawnEnabled) {
                    virusCount++;
                    if (difficultyTier >= 2) {
                        if (viruses.length < 3) spawnClusteredViruses(2, false);
                        if (blackViruses.length < 2) spawnClusteredViruses(2, true);
                    } else if (difficultyTier >= 1) {
                        if (viruses.length < 3) spawnClusteredViruses(2, false);
                    } else {
                        if (viruses.length < 3) spawnVirus(false);
                    }
                    if (virusCount >= 6 && virusCount <= 8) {
                        spawnHealthItem();
                        virusCount = 0;
                    }
                }
            }, 2600);
        }

        function updateCollectibles() {
            for (let i = 0; i < collectibles.length; i++) {
                let c = collectibles[i];
                c.x -= currentSpeed;
                if (!c.collected && player.x < c.x + c.radius && player.x + player.width > c.x - c.radius && player.y < c.y + c.radius && player.y + player.height > c.y - c.radius) {
                    c.collected = true;
                    score += c.value;
                    updateUI();
                    playSound('collect');
                    
                    let oldTier = difficultyTier;
                    if (score >= 2000 && difficultyTier === 1) {
                        difficultyTier = 2;
                        currentSpeed = 5.8;
                        player.baseJump = -11.0;
                        startSafeMode(5);
                    } else if (score >= 1000 && difficultyTier === 0) {
                        difficultyTier = 1;
                        currentSpeed = 3.8;
                        startSafeMode(5);
                    }
                    
                    if (difficultyTier === 2) {
                        currentSpeed = 5.8 + Math.floor((score - 2000) / 400) * 0.3;
                        if (currentSpeed > 7.2) currentSpeed = 7.2;
                    } else if (difficultyTier === 1) {
                        currentSpeed = 3.8 + Math.floor((score - 1000) / 300) * 0.2;
                        if (currentSpeed > 4.8) currentSpeed = 4.8;
                    } else {
                        currentSpeed = 2.5 + Math.floor(score / 50) * 0.3;
                        if (currentSpeed > 3.5) currentSpeed = 3.5;
                    }
                }
                if (c.x + c.radius < 0 || c.collected) { collectibles.splice(i, 1); i--; }
            }
        }

        function updateGiftBox() {
            if (!giftBox || giftBox.collected) return;
            giftBox.x -= currentSpeed;
            if (!giftBox.collected && player.x < giftBox.x + giftBox.width && player.x + player.width > giftBox.x && player.y < giftBox.y + giftBox.height && player.y + player.height > giftBox.y) {
                giftBox.collected = true;
                score += 10000;
                updateUI();
                playSound('bonus');
                giftBoxSpawned = false;
                giftBox = null;
            }
            if (giftBox && giftBox.x + giftBox.width < 0) {
                giftBoxSpawned = false;
                giftBox = null;
            }
        }

        function updateHealthItems() {
            for (let i = 0; i < healthItems.length; i++) {
                let h = healthItems[i];
                h.x -= currentSpeed;
                if (!h.collected && player.x < h.x + h.radius && player.x + player.width > h.x - h.radius && player.y < h.y + h.radius && player.y + player.height > h.y - h.radius) {
                    h.collected = true;
                    health = Math.min(100, health + 50);
                    updateUI();
                }
                if (h.x + h.radius < 0 || h.collected) { healthItems.splice(i, 1); i--; }
            }
        }

        function updateViruses() {
            let anyVirusPassed = false;
            for (let i = 0; i < viruses.length; i++) {
                let v = viruses[i];
                v.x -= currentSpeed;
                v.shake = Math.sin(Date.now() * 0.015 + i) * 2;
                if (!v.active && player.x < v.x + v.width && player.x + player.width > v.x && player.y + player.height > v.y && player.y < v.y + v.height) {
                    v.active = true;
                    health = Math.max(0, health - 10);
                    updateUI();
                    hitBlinkCounter = 14;
                    playSound('hit');
                    consecutiveDodges = 0;
                    if (health <= 0) gameOver();
                }
                if (v.x + v.width < 0 && !v.active) {
                    anyVirusPassed = true;
                }
                if (v.x + v.width < 0) { viruses.splice(i, 1); i--; }
            }
            for (let i = 0; i < blackViruses.length; i++) {
                let v = blackViruses[i];
                v.x -= currentSpeed;
                v.shake = Math.sin(Date.now() * 0.015 + i) * 3;
                if (!v.active && player.x < v.x + v.width && player.x + player.width > v.x && player.y + player.height > v.y && player.y < v.y + v.height) {
                    v.active = true;
                    health = Math.max(0, health - 30);
                    updateUI();
                    hitBlinkCounter = 14;
                    playSound('hit');
                    consecutiveDodges = 0;
                    if (health <= 0) gameOver();
                }
                if (v.x + v.width < 0 && !v.active) {
                    anyVirusPassed = true;
                }
                if (v.x + v.width < 0) { blackViruses.splice(i, 1); i--; }
            }
            
            if (anyVirusPassed && !giftBoxSpawned && virusSpawnEnabled) {
                consecutiveDodges++;
                if (consecutiveDodges >= 25) {
                    spawnGiftBox();
                    consecutiveDodges = 0;
                }
            }
        }

        function updatePlayer() {
            player.vy += 0.65;
            player.y += player.vy;
            player.grounded = false;
            for (let seg of groundSegments) {
                let worldX = seg.x - worldOffset;
                if (player.x + player.width > worldX && player.x < worldX + seg.w && player.y + player.height > seg.y && player.y + player.height < seg.y + 15) {
                    player.y = seg.y - player.height;
                    player.vy = 0;
                    player.grounded = true;
                    player.doubleJumpUsed = false;
                    break;
                }
            }
            if (player.x < 30) player.x = 30;
            if (player.x + player.width > W - 30) player.x = W - 30 - player.width;
            if (hitBlinkCounter > 0) hitBlinkCounter--;
        }

        function jump() {
            if (!gameRunning || paused) return;
            if (player.grounded) { 
                player.vy = player.baseJump; 
                player.grounded = false; 
                playSound('jump');
            } else if (!player.doubleJumpUsed) { 
                player.vy = player.baseJump + 0.8; 
                player.doubleJumpUsed = true; 
                playSound('jump');
            }
        }

        function togglePause() {
            if (gameState !== "playing") return;
            paused = !paused;
            if (paused) {
                document.getElementById('pauseCurrentScore').innerText = score;
                document.getElementById('pauseHighScore').innerText = highScore;
                document.getElementById('pauseOverlay').style.display = 'flex';
            } else {
                document.getElementById('pauseOverlay').style.display = 'none';
            }
        }

        function updateWorld() {
            worldOffset += currentSpeed;
            if (groundSegments[0].x - worldOffset + groundSegments[0].w < 0) {
                groundSegments.shift();
                let lastX = groundSegments[groundSegments.length-1].x;
                groundSegments.push({ x: lastX + SEGMENT_WIDTH, y: GROUND_Y, w: SEGMENT_WIDTH });
            }
        }

        function drawInfinity(x, y, size, value, isGlowing = true, color = '#3b82f6', shadowColor = '#3b82f6') {
            ctx.save();
            ctx.translate(x, y);
            if (isGlowing) { ctx.shadowBlur = 15; ctx.shadowColor = shadowColor; }
            ctx.beginPath();
            ctx.ellipse(-size*0.4, 0, size*0.4, size*0.25, 0, 0, Math.PI*2);
            ctx.ellipse(size*0.4, 0, size*0.4, size*0.25, 0, 0, Math.PI*2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.ellipse(-size*0.4, 0, size*0.2, size*0.12, 0, 0, Math.PI*2);
            ctx.ellipse(size*0.4, 0, size*0.2, size*0.12, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            ctx.restore();
            if (value) {
                ctx.font = `bold ${size-2}px monospace`;
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 4;
                ctx.fillText(`+${value}`, x-10, y-15);
                ctx.shadowBlur = 0;
            }
        }

        function drawGreenHealth(x, y, size) {
            ctx.save();
            ctx.translate(x, y);
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ff00';
            ctx.beginPath();
            ctx.ellipse(-size*0.4, 0, size*0.4, size*0.25, 0, 0, Math.PI*2);
            ctx.ellipse(size*0.4, 0, size*0.4, size*0.25, 0, 0, Math.PI*2);
            ctx.fillStyle = '#00ff00';
            ctx.fill();
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.ellipse(-size*0.4, 0, size*0.2, size*0.12, 0, 0, Math.PI*2);
            ctx.ellipse(size*0.4, 0, size*0.2, size*0.12, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            ctx.restore();
            ctx.font = `bold ${size-4}px monospace`;
            ctx.fillStyle = '#ffffff';
            ctx.fillText('+50%', x-15, y-12);
        }

        function drawGiftBox(x, y) {
            ctx.save();
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff0000';
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(x-12, y-12, 24, 24);
            ctx.fillStyle = '#2a2a2a';
            ctx.fillRect(x-10, y-10, 20, 20);
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(x-12, y-3, 24, 6);
            ctx.fillRect(x-3, y-12, 6, 24);
            ctx.beginPath();
            ctx.moveTo(x-8, y-12);
            ctx.lineTo(x-14, y-20);
            ctx.lineTo(x-3, y-14);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(x+8, y-12);
            ctx.lineTo(x+14, y-20);
            ctx.lineTo(x+3, y-14);
            ctx.fill();
            ctx.restore();
        }

        function drawVirus(x, y, shake, isBlack = false) {
            ctx.save();
            ctx.translate(x + shake, y);
            let mainColor = isBlack ? '#1a1a1a' : '#8b0000';
            let innerColor = isBlack ? '#333333' : '#ff4444';
            ctx.fillStyle = mainColor;
            ctx.beginPath();
            ctx.arc(9, 10, 9, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = innerColor;
            ctx.beginPath();
            ctx.arc(9, 10, 6, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(6, 7, 2, 0, Math.PI*2);
            ctx.arc(12, 7, 2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(5.5, 6.5, 1, 0, Math.PI*2);
            ctx.arc(11.5, 6.5, 1, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = isBlack ? '#660000' : '#ff0000';
            ctx.beginPath();
            ctx.ellipse(9, 13, 3, 2, 0, 0, Math.PI*2);
            ctx.fill();
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(9 + Math.sin(i) * 12, 10 + Math.cos(i*2) * 8);
                ctx.lineTo(9 + Math.sin(i+0.5) * 6, 10 + Math.cos((i+0.5)*2) * 4);
                ctx.lineTo(9 + Math.sin(i-0.5) * 6, 10 + Math.cos((i-0.5)*2) * 4);
                ctx.fillStyle = isBlack ? '#440000' : '#aa2222';
                ctx.fill();
            }
            ctx.restore();
        }

        function drawPlayer() {
            let x = player.x, y = player.y;
            let legOffset = Math.sin(Date.now() * 0.012) * 4;
            let armOffset = Math.sin(Date.now() * 0.015) * 5;
            let orbRotate = Date.now() * 0.008;
            let blink = hitBlinkCounter > 0 && (Math.floor(hitBlinkCounter / 2) % 2 === 0);
            
            ctx.save();
            if (blink) { ctx.globalAlpha = 0.4; ctx.shadowBlur = 20; ctx.shadowColor = '#ffffff'; }
            
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(x+14, y+42, 12, 5, 0, 0, Math.PI*2);
            ctx.fill();
            
            ctx.fillStyle = '#1a3a5a';
            ctx.fillRect(x+5, y+28, 7, 10 + legOffset);
            ctx.fillRect(x+18, y+28, 7, 10 - legOffset);
            
            ctx.fillStyle = '#0a2a3a';
            ctx.fillRect(x+3, y+38, 9, 5);
            ctx.fillRect(x+18, y+38, 9, 5);
            
            let gradBody = ctx.createLinearGradient(x+5, y+12, x+23, y+32);
            gradBody.addColorStop(0, '#3b82f6');
            gradBody.addColorStop(1, '#1a4a8a');
            ctx.fillStyle = gradBody;
            ctx.fillRect(x+5, y+12, 20, 22);
            
            drawInfinity(x+15, y+22, 7, null, true, '#3b82f6', '#3b82f6');
            
            ctx.fillStyle = '#3b82f6';
            ctx.fillRect(x-4 + armOffset, y+16, 7, 8);
            ctx.fillRect(x+27 - armOffset, y+16, 7, 8);
            
            ctx.fillStyle = '#1a3a5a';
            ctx.fillRect(x-5 + armOffset, y+22, 4, 4);
            ctx.fillRect(x+31 - armOffset, y+22, 4, 4);
            
            ctx.fillStyle = '#2a5a8a';
            ctx.fillRect(x+6, y+2, 18, 14);
            
            ctx.fillStyle = '#0a1a2a';
            ctx.fillRect(x+8, y+7, 6, 3);
            ctx.fillRect(x+16, y+7, 6, 3);
            
            ctx.fillStyle = '#3b82f6';
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#3b82f6';
            ctx.fillRect(x+9, y+8, 4, 2);
            ctx.fillRect(x+17, y+8, 4, 2);
            
            ctx.fillStyle = '#f5a623';
            ctx.fillRect(x+4, y+4, 22, 3);
            
            ctx.fillStyle = '#1a3a5a';
            ctx.beginPath();
            ctx.moveTo(x+22, y+14);
            ctx.lineTo(x+28, y+28);
            ctx.lineTo(x+22, y+26);
            ctx.fill();
            
            ctx.restore();
        }

        function drawGround() {
            for (let seg of groundSegments) {
                let drawX = seg.x - worldOffset;
                ctx.fillStyle = '#1a2a3a';
                ctx.fillRect(drawX, seg.y, seg.w, 12);
                ctx.fillStyle = '#2a3a4a';
                ctx.fillRect(drawX, seg.y-4, seg.w, 5);
            }
        }

        function drawCollectibles() {
            for (let c of collectibles) {
                let floatY = Math.sin(Date.now() * 0.003 + c.floatOffset) * 3;
                drawInfinity(c.x, c.y + floatY, c.radius+1, c.value, true, '#3b82f6', '#3b82f6');
            }
        }

        function drawHealthItems() {
            for (let h of healthItems) {
                let floatY = Math.sin(Date.now() * 0.003 + h.floatOffset) * 3;
                drawGreenHealth(h.x, h.y + floatY, h.radius+1);
            }
        }

        function drawViruses() {
            for (let v of viruses) drawVirus(v.x, v.y, v.shake, false);
            for (let v of blackViruses) drawVirus(v.x, v.y, v.shake, true);
        }

        let planetsQueue = [
            { x: -150, y: 120, size: 80, color1: '#8b5cf6', color2: '#6d28d9', ring: true, ringColor: '#c084fc', active: true },
            { x: -150, y: 280, size: 95, color1: '#3b82f6', color2: '#1e40af', ring: false, active: false },
            { x: -150, y: 400, size: 70, color1: '#f59e0b', color2: '#b45309', ring: true, ringColor: '#fbbf24', active: false },
            { x: -150, y: 500, size: 85, color1: '#ec4899', color2: '#be185d', ring: false, active: false },
            { x: -150, y: 180, size: 75, color1: '#06b6d4', color2: '#0891b2', ring: true, ringColor: '#67e8f9', active: false }
        ];
        let currentPlanetIndex = 0;
        let planetSpeed = 1.2;
        
        function updatePlanets() {
            let activePlanet = planetsQueue[currentPlanetIndex];
            if (activePlanet) {
                activePlanet.x += planetSpeed;
                if (activePlanet.x > W + 200) {
                    activePlanet.active = false;
                    activePlanet.x = -150;
                    currentPlanetIndex = (currentPlanetIndex + 1) % planetsQueue.length;
                    planetsQueue[currentPlanetIndex].active = true;
                    planetsQueue[currentPlanetIndex].x = -150;
                }
            }
        }
        
        function drawPlanets() {
            for (let p of planetsQueue) {
                if (!p.active) continue;
                ctx.save();
                ctx.shadowBlur = 25;
                ctx.shadowColor = p.color1;
                ctx.globalAlpha = 0.75;
                let grad = ctx.createLinearGradient(p.x - 20, p.y - 20, p.x + 20, p.y + 20);
                grad.addColorStop(0, p.color1);
                grad.addColorStop(1, p.color2);
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                if (p.ring) {
                    ctx.globalAlpha = 0.5;
                    ctx.fillStyle = p.ringColor;
                    ctx.beginPath();
                    ctx.ellipse(p.x, p.y, p.size + 18, p.size * 0.25, Math.PI / 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 0.3;
                    ctx.beginPath();
                    ctx.ellipse(p.x, p.y, p.size + 28, p.size * 0.3, Math.PI / 4, 0, Math.PI * 2);
                    ctx.fill();
                }
                if (!p.ring) {
                    ctx.globalAlpha = 0.4;
                    ctx.fillStyle = '#000000';
                    ctx.beginPath();
                    ctx.arc(p.x - 18, p.y - 12, p.size * 0.12, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(p.x + 15, p.y + 10, p.size * 0.1, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(p.x - 8, p.y + 18, p.size * 0.08, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        let stars = [];
        for (let i = 0; i < 150; i++) stars.push({ x: Math.random() * W, y: Math.random() * H, size: Math.random() * 2, alpha: 0.3 + Math.random() * 0.7 });
        let bgInfinity = [];
        for (let i = 0; i < 6; i++) bgInfinity.push({ x: Math.random() * W, y: 30 + Math.random() * 200, size: 20 + Math.random() * 15, speed: 0.05 + Math.random() * 0.1 });

        function drawBackground() {
            let grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#0a0a2a');
            grad.addColorStop(0.5, '#15153a');
            grad.addColorStop(1, '#1a1a3a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
            for (let s of stars) {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                ctx.fillRect(s.x, s.y, s.size, s.size);
                s.x -= 0.1;
                if (s.x < 0) s.x = W;
            }
            drawPlanets();
            for (let b of bgInfinity) {
                ctx.save();
                ctx.globalAlpha = 0.15;
                ctx.shadowBlur = 8;
                drawInfinity(b.x, b.y, b.size, null, true, '#3b82f6', '#3b82f6');
                ctx.restore();
                b.x -= b.speed;
                if (b.x + b.size < 0) b.x = W + b.size;
            }
        }

        function gameOver() {
            if (!gameRunning) return;
            gameRunning = false;
            gameState = "gameOver";
            playSound('gameover');
            document.getElementById('finalScore').innerText = score;
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('score').style.display = 'none';
            document.getElementById('topText').style.display = 'none';
            document.getElementById('healthBarContainer').style.display = 'none';
            document.getElementById('pauseBtn').style.display = 'none';
            document.getElementById('jumpBtn').style.display = 'none';
            document.querySelector('.game-footer').style.display = 'none';
            document.getElementById('pauseOverlay').style.display = 'none';
        }

        function restartGame() { startGame(); }
        function exitToMenu() { gameState = "menu"; gameRunning = false; document.getElementById('score').style.display = 'none'; document.getElementById('topText').style.display = 'none'; document.getElementById('healthBarContainer').style.display = 'none'; document.getElementById('pauseBtn').style.display = 'none'; document.getElementById('jumpBtn').style.display = 'none'; document.querySelector('.game-footer').style.display = 'none'; document.getElementById('gameOver').style.display = 'none'; document.getElementById('pauseOverlay').style.display = 'none'; }
        function claimGameOverIFC() { alert(`💰 TOTAL IFC EARNED: ${score} IFC\n🔧 Smart contract deployment coming soon!`); }

        function drawMenu() {
            drawBackground();
            ctx.font = 'bold 32px monospace';
            ctx.fillStyle = '#3b82f6';
            ctx.shadowBlur = 10;
            ctx.fillText('INFINITE JUMPER', W/2-130, H/4);
            ctx.font = '14px monospace';
            ctx.fillStyle = '#cbd5e1';
            ctx.fillText('Collect Infinity Coins | Avoid Viruses', W/2-125, H/4 + 35);
            ctx.fillStyle = '#94a3b8';
            ctx.font = '12px monospace';
            ctx.fillText('Double Jump | Survive | Earn IFC', W/2-105, H/4 + 55);
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 0;
            ctx.fillRect(W/2-100, H/2 - 30, 200, 130);
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 1;
            ctx.strokeRect(W/2-100, H/2 - 30, 200, 130);
            ctx.fillStyle = dailyBonusAvailable ? '#f5a623' : '#3b82f6';
            ctx.fillRect(W/2-80, H/2 - 15, 160, 32);
            ctx.fillStyle = '#000000';
            ctx.font = 'bold 14px monospace';
            ctx.fillText(dailyBonusAvailable ? '🎁 DAILY BONUS' : '✓ BONUS CLAIMED', W/2-65, H/2 + 8);
            ctx.fillStyle = '#3b82f6';
            ctx.fillRect(W/2-80, H/2 + 30, 160, 38);
            ctx.fillStyle = '#000000';
            ctx.font = 'bold 16px monospace';
            ctx.fillText('▶ START GAME', W/2-55, H/2 + 55);
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(W/2-50, H/2 + 85, 100, 28);
            ctx.fillStyle = '#3b82f6';
            ctx.font = '12px monospace';
            ctx.fillText(soundEnabled ? '🔊 SOUND ON' : '🔇 SOUND OFF', W/2-40, H/2 + 105);
            if (dailyBonusAvailable) {
                ctx.fillStyle = '#f5a623';
                ctx.font = 'bold 10px monospace';
                ctx.fillText('✦ BONUS READY ✦', W/2-45, H/2 - 20);
            }
        }

        function updateGame() { 
            if (gameState === "playing" && gameRunning && !paused) { 
                updateWorld(); 
                updatePlayer(); 
                updateCollectibles(); 
                updateGiftBox();
                updateHealthItems(); 
                updateViruses(); 
                updatePlanets();
            } 
        }
        
        function draw() {
            if (gameState === "menu") drawMenu();
            else { 
                drawBackground(); 
                drawGround(); 
                drawCollectibles(); 
                drawHealthItems(); 
                drawViruses(); 
                if (giftBox && !giftBox.collected) drawGiftBox(giftBox.x, giftBox.y);
                drawPlayer(); 
            } 
        }
        
        function animate() { updateGame(); draw(); requestAnimationFrame(animate); }

        initGround();
        animate();

        canvas.addEventListener('click', (e) => { 
            if (gameState !== "menu") return; 
            const rect = canvas.getBoundingClientRect(); 
            const scaleX = canvas.width / rect.width; 
            const scaleY = canvas.height / rect.height; 
            let mouseX = (e.clientX - rect.left) * scaleX; 
            let mouseY = (e.clientY - rect.top) * scaleY; 
            if (mouseX > W/2-80 && mouseX < W/2+80 && mouseY > H/2-15 && mouseY < H/2+17 && dailyBonusAvailable) { 
                claimDailyBonus(); 
                drawMenu();
            } else if (mouseX > W/2-80 && mouseX < W/2+80 && mouseY > H/2+30 && mouseY < H/2+68) { 
                startGame(); 
            } else if (mouseX > W/2-50 && mouseX < W/2+50 && mouseY > H/2+85 && mouseY < H/2+113) { 
                toggleSound(); 
                drawMenu();
            } 
        });
        
        canvas.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            if (gameState !== "menu") return; 
            const rect = canvas.getBoundingClientRect(); 
            const scaleX = canvas.width / rect.width; 
            const scaleY = canvas.height / rect.height; 
            const touch = e.touches[0]; 
            let touchX = (touch.clientX - rect.left) * scaleX; 
            let touchY = (touch.clientY - rect.top) * scaleY; 
            if (touchX > W/2-80 && touchX < W/2+80 && touchY > H/2-15 && touchY < H/2+17 && dailyBonusAvailable) { 
                claimDailyBonus(); 
                drawMenu();
            } else if (touchX > W/2-80 && touchX < W/2+80 && touchY > H/2+30 && touchY < H/2+68) { 
                startGame(); 
            } else if (touchX > W/2-50 && touchX < W/2+50 && touchY > H/2+85 && touchY < H/2+113) { 
                toggleSound(); 
                drawMenu();
            } 
        });

        document.getElementById('jumpBtn').onclick = (e) => { e.preventDefault(); if (gameState === "playing" && !paused) jump(); };
        document.getElementById('jumpBtn').ontouchstart = (e) => { e.preventDefault(); if (gameState === "playing" && !paused) jump(); };
        
        document.getElementById('gameoverRestartBtn').onclick = () => restartGame();
        document.getElementById('gameoverClaimBtn').onclick = () => claimGameOverIFC();
        document.getElementById('gameoverHomeBtn').onclick = () => exitToMenu();
        
        const pauseBtn = document.getElementById('pauseBtn');
        if (pauseBtn) {
            pauseBtn.onclick = (e) => { e.preventDefault(); togglePause(); };
            pauseBtn.ontouchstart = (e) => { e.preventDefault(); togglePause(); };
        }
        
        document.getElementById('resumeBtn').onclick = () => { togglePause(); };
        document.getElementById('pauseRestartBtn').onclick = () => { if (gameState === "playing") { restartGame(); paused = false; document.getElementById('pauseOverlay').style.display = 'none'; } };
        document.getElementById('exitMenuBtn').onclick = () => { exitToMenu(); paused = false; document.getElementById('pauseOverlay').style.display = 'none'; };
        document.getElementById('claimBtn').onclick = () => alert('🔧 SMART CONTRACT DEPLOYMENT SOON');
        document.getElementById('pauseSoundToggle').onclick = () => { toggleSound(); };
        
        window.onkeydown = (e) => { 
            if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); if (gameState === "playing" && !paused) jump(); } 
            if (e.code === 'KeyP' && gameState === "playing") togglePause(); 
            if (e.code === 'KeyM') { toggleSound(); if (gameState === "menu") drawMenu(); }
        };
        
        checkDailyBonus();
    })();
</script>
</body>
</html>
