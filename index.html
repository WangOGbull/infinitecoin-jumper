<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Infinitecoin Jumper</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none}
        body{background:#0a2a4a;min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:monospace}
        .game-container{position:relative;width:100%;max-width:480px}
        canvas{display:block;width:100%;height:auto;border-radius:24px;background:#5c9ed4;cursor:pointer}
        #score{position:absolute;top:15px;left:15px;background:rgba(0,0,0,0.7);padding:8px 18px;border-radius:40px;color:#f5a623;font-weight:bold;font-size:22px;z-index:10}
        #controls{position:absolute;bottom:20px;left:0;right:0;display:flex;justify-content:center;z-index:20}
        .ctrl-btn{background:rgba(0,0,0,0.7);border:2px solid #f5a623;color:#f5a623;font-size:24px;font-weight:bold;padding:10px 28px;border-radius:60px;cursor:pointer}
        .ctrl-btn:active{background:#f5a623;color:#000}
        #gameOver{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.95);padding:25px 35px;border-radius:32px;text-align:center;z-index:30;display:none;border:1px solid #f5a623}
        #gameOver h2{color:#f5a623;margin-bottom:15px}
        #gameOver p{color:white;font-size:22px;margin-bottom:20px}
        #restartBtn{background:#f5a623;border:none;padding:10px 25px;border-radius:40px;font-size:18px;font-weight:bold;cursor:pointer}
        .game-footer{position:absolute;bottom:-28px;left:0;right:0;text-align:center;font-size:10px;color:white}
    </style>
</head>
<body>
<div class="game-container">
    <div id="score">♾️ IFC: 0</div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div id="controls"><button class="ctrl-btn" id="jumpBtn">▲ JUMP</button></div>
    <div id="gameOver"><h2>GAME OVER</h2><p>♾️ IFC: <span id="finalScore">0</span></p><button id="restartBtn">RESTART</button></div>
    <div class="game-footer">♾️ INFINITE COIN | COLLECT ∞ | DOUBLE JUMP</div>
</div>
<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 400, H = 600;
        canvas.width = W;
        canvas.height = H;

        let gameRunning = true;
        let score = 0;
        let worldOffset = 0;
        let currentSpeed = 2.5;

        let player = { x: 100, y: 0, vy: 0, width: 22, height: 26, grounded: false, doubleJumpUsed: false };

        let groundSegments = [];
        const GROUND_Y = H - 60;
        const SEGMENT_WIDTH = 60;

        function initGround() {
            groundSegments = [];
            for (let i = 0; i < 15; i++) {
                groundSegments.push({ x: i * SEGMENT_WIDTH, y: GROUND_Y, w: SEGMENT_WIDTH });
            }
        }

        let collectibles = [];

        function spawnCollectible() {
            let x = 200 + Math.random() * 200;
            let y = GROUND_Y - 35 - Math.random() * 45;
            let value = Math.floor(Math.random() * 16) + 5;
            collectibles.push({ x: x, y: y, radius: 12, value: value, collected: false, floatOffset: Math.random() * Math.PI * 2 });
        }

        setInterval(() => { if (gameRunning && collectibles.length < 8) spawnCollectible(); }, 2000);
        for (let i = 0; i < 4; i++) setTimeout(() => spawnCollectible(), i * 400);

        function updateCollectibles() {
            for (let i = 0; i < collectibles.length; i++) {
                let c = collectibles[i];
                c.x -= currentSpeed;
                if (!c.collected && player.x < c.x + c.radius && player.x + player.width > c.x - c.radius && player.y < c.y + c.radius && player.y + player.height > c.y - c.radius) {
                    c.collected = true;
                    score += c.value;
                    document.getElementById('score').innerHTML = `♾️ IFC: ${score}`;
                    currentSpeed = 2.5 + Math.floor(score / 50) * 0.4;
                    if (currentSpeed > 6) currentSpeed = 6;
                }
                if (c.x + c.radius < 0 || c.collected) { collectibles.splice(i, 1); i--; }
            }
        }

        function updatePlayer() {
            player.vy += 0.65;
            player.y += player.vy;
            player.grounded = false;
            for (let seg of groundSegments) {
                let worldX = seg.x - worldOffset;
                if (player.x + player.width > worldX && player.x < worldX + seg.w && player.y + player.height > seg.y && player.y + player.height < seg.y + 15) {
                    player.y = seg.y - player.height;
                    player.vy = 0;
                    player.grounded = true;
                    player.doubleJumpUsed = false;
                    break;
                }
            }
            if (player.x < 30) player.x = 30;
            if (player.x + player.width > W - 30) player.x = W - 30 - player.width;
            if (player.y > H + 50) gameOver();
        }

        function jump() {
            if (!gameRunning) return;
            if (player.grounded) { player.vy = -9.5; player.grounded = false; }
            else if (!player.doubleJumpUsed) { player.vy = -9.0; player.doubleJumpUsed = true; }
        }

        function updateWorld() {
            worldOffset += currentSpeed;
            if (groundSegments[0].x - worldOffset + groundSegments[0].w < 0) {
                groundSegments.shift();
                let lastX = groundSegments[groundSegments.length-1].x;
                groundSegments.push({ x: lastX + SEGMENT_WIDTH, y: GROUND_Y, w: SEGMENT_WIDTH });
            }
        }

        function drawInfinity(x, y, size, value) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(1, 0.7);
            ctx.beginPath();
            ctx.arc(-size*0.5, 0, size*0.45, 0, Math.PI*2);
            ctx.arc(size*0.5, 0, size*0.45, 0, Math.PI*2);
            ctx.fillStyle = '#f5a623';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(-size*0.5, 0, size*0.25, 0, Math.PI*2);
            ctx.arc(size*0.5, 0, size*0.25, 0, Math.PI*2);
            ctx.fillStyle = '#0f2f3f';
            ctx.fill();
            ctx.restore();
            ctx.font = `bold 10px monospace`;
            ctx.fillStyle = 'white';
            ctx.fillText(`+${value}`, x-10, y-12);
        }

        function drawPlayer() {
            let x = player.x, y = player.y;
            ctx.fillStyle = '#C22B2B';
            ctx.fillRect(x+4, y-6, 14, 8);
            ctx.fillStyle = '#FDD7A4';
            ctx.fillRect(x+2, y, 18, 18);
            ctx.fillStyle = '#000';
            ctx.fillRect(x+6, y+4, 3, 4);
            ctx.fillRect(x+13, y+4, 3, 4);
            ctx.fillStyle = '#E52525';
            ctx.fillRect(x+2, y+16, 18, 12);
            ctx.fillStyle = '#2C2C8C';
            ctx.fillRect(x, y+24, 22, 8);
        }

        function drawGround() {
            for (let seg of groundSegments) {
                let drawX = seg.x - worldOffset;
                ctx.fillStyle = '#4c8b3b';
                ctx.fillRect(drawX, seg.y, seg.w, 12);
                ctx.fillStyle = '#6aa84f';
                ctx.fillRect(drawX, seg.y-4, seg.w, 5);
            }
        }

        function drawCollectibles() {
            for (let c of collectibles) {
                let floatY = Math.sin(Date.now() * 0.003 + c.floatOffset) * 3;
                drawInfinity(c.x, c.y + floatY, c.radius+2, c.value);
            }
        }

        let clouds = [];
        for (let i = 0; i < 5; i++) clouds.push({ x: Math.random()*W, y: 40+Math.random()*120, size: 35+Math.random()*30 });

        function drawBackground() {
            let grad = ctx.createLinearGradient(0,0,0,H);
            grad.addColorStop(0, '#6ab0de');
            grad.addColorStop(1, '#3d7ca3');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,W,H);
            ctx.fillStyle = 'rgba(255,255,245,0.85)';
            for (let c of clouds) {
                ctx.beginPath();
                ctx.ellipse(c.x, c.y, c.size/2, c.size/3, 0, 0, Math.PI*2);
                ctx.fill();
                c.x -= 0.3;
                if (c.x + c.size < 0) c.x = W + c.size;
            }
        }

        function gameOver() {
            if (!gameRunning) return;
            gameRunning = false;
            document.getElementById('finalScore').innerText = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        function restartGame() {
            gameRunning = true;
            score = 0;
            currentSpeed = 2.5;
            worldOffset = 0;
            document.getElementById('score').innerHTML = '♾️ IFC: 0';
            player.y = GROUND_Y - player.height;
            player.vy = 0;
            player.grounded = true;
            player.doubleJumpUsed = false;
            player.x = 100;
            collectibles = [];
            initGround();
            for (let i = 0; i < 4; i++) setTimeout(() => spawnCollectible(), i * 300);
            document.getElementById('gameOver').style.display = 'none';
        }

        document.getElementById('jumpBtn').onclick = (e) => { e.preventDefault(); jump(); };
        document.getElementById('restartBtn').onclick = () => restartGame();
        window.onkeydown = (e) => { if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); } };
        canvas.ontouchstart = (e) => { e.preventDefault(); jump(); };
        canvas.onmousedown = (e) => { e.preventDefault(); jump(); };

        function updateGame() {
            if (gameRunning) {
                updateWorld();
                updatePlayer();
                updateCollectibles();
            }
        }

        function draw() {
            drawBackground();
            drawGround();
            drawCollectibles();
            drawPlayer();
            ctx.font = 'bold 12px monospace';
            ctx.fillStyle = 'white';
            ctx.fillText('∞ COLLECT INFINITE COINS ∞', W/2-100, 35);
        }

        function animate() { updateGame(); draw(); requestAnimationFrame(animate); }

        initGround();
        player.y = GROUND_Y - player.height;
        player.grounded = true;
        animate();

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }
    })();
</script>
</body>
</html>
