<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Infinitecoin Jumper - Anime Infinite Being</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a2a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
        }
        .game-container {
            position: relative;
            width: 100%;
            max-width: 480px;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 24px;
            cursor: pointer;
        }
        #score {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 40px;
            color: #3b82f6;
            font-weight: bold;
            font-size: 22px;
            z-index: 10;
            border: 1px solid #3b82f6;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 20;
        }
        .ctrl-btn {
            background: rgba(0,0,0,0.7);
            border: 2px solid #3b82f6;
            color: #3b82f6;
            font-size: 24px;
            font-weight: bold;
            padding: 10px 28px;
            border-radius: 60px;
            cursor: pointer;
            backdrop-filter: blur(8px);
        }
        .ctrl-btn:active {
            background: #3b82f6;
            color: #000;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            padding: 25px 35px;
            border-radius: 32px;
            text-align: center;
            z-index: 30;
            display: none;
            border: 1px solid #3b82f6;
        }
        #gameOver h2 {
            color: #3b82f6;
            margin-bottom: 15px;
        }
        #gameOver p {
            color: white;
            font-size: 22px;
            margin-bottom: 20px;
        }
        #restartBtn {
            background: #3b82f6;
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .game-footer {
            position: absolute;
            bottom: -28px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            color: #3b82f6;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div id="score">♾️ IFC: 0</div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div id="controls"><button class="ctrl-btn" id="jumpBtn">▲ JUMP</button></div>
    <div id="gameOver"><h2>✦ GAME OVER ✦</h2><p>♾️ IFC: <span id="finalScore">0</span></p><button id="restartBtn">RESTART</button></div>
    <div class="game-footer">♾️ INFINITE COIN | COLLECT ∞ | AVOID VIRUSES | DOUBLE JUMP</div>
</div>
<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 400, H = 600;
        canvas.width = W;
        canvas.height = H;

        let gameRunning = true;
        let score = 0;
        let worldOffset = 0;
        let currentSpeed = 2.5;
        let frame = 0;
        let hitBlinkCounter = 0;

        let player = { x: 100, y: 0, vy: 0, width: 32, height: 40, grounded: false, doubleJumpUsed: false };

        let groundSegments = [];
        const GROUND_Y = H - 60;
        const SEGMENT_WIDTH = 60;

        function initGround() {
            groundSegments = [];
            for (let i = 0; i < 20; i++) {
                groundSegments.push({ x: i * SEGMENT_WIDTH, y: GROUND_Y, w: SEGMENT_WIDTH });
            }
        }

        let collectibles = [];
        let viruses = [];

        function spawnCollectible() {
            let x = 250 + Math.random() * 200;
            let y = GROUND_Y - 40 - Math.random() * 50;
            let value = Math.floor(Math.random() * 16) + 5;
            collectibles.push({ x: x, y: y, radius: 12, value: value, collected: false, floatOffset: Math.random() * Math.PI * 2 });
        }

        function spawnVirus() {
            let x = 300 + Math.random() * 250;
            viruses.push({ x: x, y: GROUND_Y - 18, width: 18, height: 20, active: false, shake: 0 });
        }

        setInterval(() => { if (gameRunning && collectibles.length < 6) spawnCollectible(); }, 1800);
        setInterval(() => { if (gameRunning && viruses.length < 3) spawnVirus(); }, 2500);
        for (let i = 0; i < 4; i++) setTimeout(() => spawnCollectible(), i * 400);
        for (let i = 0; i < 2; i++) setTimeout(() => spawnVirus(), i * 1000);

        function updateCollectibles() {
            for (let i = 0; i < collectibles.length; i++) {
                let c = collectibles[i];
                c.x -= currentSpeed;
                if (!c.collected && player.x < c.x + c.radius && player.x + player.width > c.x - c.radius && player.y < c.y + c.radius && player.y + player.height > c.y - c.radius) {
                    c.collected = true;
                    score += c.value;
                    document.getElementById('score').innerHTML = `♾️ IFC: ${score}`;
                    currentSpeed = 2.5 + Math.floor(score / 50) * 0.3;
                    if (currentSpeed > 5.5) currentSpeed = 5.5;
                }
                if (c.x + c.radius < 0 || c.collected) { collectibles.splice(i, 1); i--; }
            }
        }

        function updateViruses() {
            for (let i = 0; i < viruses.length; i++) {
                let v = viruses[i];
                v.x -= currentSpeed;
                v.shake = Math.sin(Date.now() * 0.015 + i) * 2;
                if (!v.active && player.x < v.x + v.width && player.x + player.width > v.x && player.y + player.height > v.y && player.y < v.y + v.height) {
                    v.active = true;
                    score = Math.max(0, score - 10);
                    document.getElementById('score').innerHTML = `♾️ IFC: ${score}`;
                    hitBlinkCounter = 14;
                }
                if (v.x + v.width < 0) { viruses.splice(i, 1); i--; }
            }
        }

        function updatePlayer() {
            player.vy += 0.65;
            player.y += player.vy;
            player.grounded = false;
            for (let seg of groundSegments) {
                let worldX = seg.x - worldOffset;
                if (player.x + player.width > worldX && player.x < worldX + seg.w && player.y + player.height > seg.y && player.y + player.height < seg.y + 15) {
                    player.y = seg.y - player.height;
                    player.vy = 0;
                    player.grounded = true;
                    player.doubleJumpUsed = false;
                    break;
                }
            }
            if (player.x < 30) player.x = 30;
            if (player.x + player.width > W - 30) player.x = W - 30 - player.width;
            if (player.y > H + 50) gameOver();
            if (hitBlinkCounter > 0) hitBlinkCounter--;
        }

        function jump() {
            if (!gameRunning) return;
            if (player.grounded) { 
                player.vy = -9.5; 
                player.grounded = false; 
            } else if (!player.doubleJumpUsed) { 
                player.vy = -9.0; 
                player.doubleJumpUsed = true; 
            }
        }

        function updateWorld() {
            worldOffset += currentSpeed;
            if (groundSegments[0].x - worldOffset + groundSegments[0].w < 0) {
                groundSegments.shift();
                let lastX = groundSegments[groundSegments.length-1].x;
                groundSegments.push({ x: lastX + SEGMENT_WIDTH, y: GROUND_Y, w: SEGMENT_WIDTH });
            }
        }

        function drawInfinity(x, y, size, value, color = '#3b82f6', glowColor = '#3b82f6') {
            ctx.save();
            ctx.translate(x, y);
            ctx.shadowBlur = 12;
            ctx.shadowColor = glowColor;
            // Left loop
            ctx.beginPath();
            ctx.ellipse(-size*0.4, 0, size*0.4, size*0.25, 0, 0, Math.PI*2);
            // Right loop
            ctx.beginPath();
            ctx.ellipse(size*0.4, 0, size*0.4, size*0.25, 0, 0, Math.PI*2);
            ctx.fillStyle = color;
            ctx.fill();
            // Inner cutout
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.ellipse(-size*0.4, 0, size*0.2, size*0.12, 0, 0, Math.PI*2);
            ctx.ellipse(size*0.4, 0, size*0.2, size*0.12, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            ctx.restore();
            if (value) {
                ctx.font = `bold ${size-2}px monospace`;
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 4;
                ctx.shadowColor = glowColor;
                ctx.fillText(`+${value}`, x-11, y-16);
                ctx.shadowBlur = 0;
            }
        }

        function drawVirus(x, y, shake) {
            ctx.save();
            ctx.translate(x + shake, y);
            ctx.fillStyle = '#8b0000';
            ctx.beginPath();
            ctx.arc(9, 10, 9, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.arc(9, 10, 6, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(6, 7, 2, 0, Math.PI*2);
            ctx.arc(12, 7, 2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(5.5, 6.5, 1, 0, Math.PI*2);
            ctx.arc(11.5, 6.5, 1, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.ellipse(9, 13, 3, 2, 0, 0, Math.PI*2);
            ctx.fill();
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(9 + Math.sin(i) * 12, 10 + Math.cos(i*2) * 8);
                ctx.lineTo(9 + Math.sin(i+0.5) * 6, 10 + Math.cos((i+0.5)*2) * 4);
                ctx.lineTo(9 + Math.sin(i-0.5) * 6, 10 + Math.cos((i-0.5)*2) * 4);
                ctx.fillStyle = '#aa2222';
                ctx.fill();
            }
            ctx.restore();
        }

        function drawPlayer() {
            let x = player.x, y = player.y;
            let legSwing = Math.sin(Date.now() * 0.012) * 5;
            let armSwing = Math.sin(Date.now() * 0.015) * 6;
            let orbSpin = Date.now() * 0.008;
            let blink = hitBlinkCounter > 0 && (Math.floor(hitBlinkCounter / 2) % 2 === 0);
            
            ctx.save();
            if (blink) {
                ctx.globalAlpha = 0.4;
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ffffff';
            }
            
            // Ground shadow
            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            ctx.beginPath();
            ctx.ellipse(x+16, y+44, 14, 5, 0, 0, Math.PI*2);
            ctx.fill();
            
            // Legs
            ctx.fillStyle = '#1a5a8a';
            ctx.fillRect(x+6, y+30, 7, 12 + legSwing);
            ctx.fillRect(x+19, y+30 - legSwing, 7, 12 + legSwing);
            
            // Shoes
            ctx.fillStyle = '#0a2a4a';
            ctx.fillRect(x+4, y+40, 9, 6);
            ctx.fillRect(x+19, y+40, 9, 6);
            
            // Body with gradient
            let gradBody = ctx.createLinearGradient(x+5, y+12, x+27, y+34);
            gradBody.addColorStop(0, '#3b82f6');
            gradBody.addColorStop(1, '#1a4a8a');
            ctx.fillStyle = gradBody;
            ctx.fillRect(x+5, y+12, 22, 24);
            
            // Chest infinity
            drawInfinity(x+16, y+26, 9, null, '#3b82f6', '#3b82f6');
            
            // Arms
            ctx.fillStyle = '#3b82f6';
            ctx.fillRect(x-5 + armSwing, y+18, 8, 10);
            ctx.fillRect(x+29 - armSwing, y+18, 8, 10);
            
            // Hand orbs
            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#3b82f6';
            ctx.beginPath();
            ctx.arc(x-8 + armSwing + Math.sin(orbSpin)*3, y+24, 8, 0, Math.PI*2);
            ctx.fillStyle = '#3b82f6';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x+35 - armSwing + Math.cos(orbSpin)*3, y+24, 8, 0, Math.PI*2);
            ctx.fill();
            drawInfinity(x-8 + armSwing + Math.sin(orbSpin)*3, y+24, 7, null, '#3b82f6', '#3b82f6');
            drawInfinity(x+35 - armSwing + Math.cos(orbSpin)*3, y+24, 7, null, '#3b82f6', '#3b82f6');
            ctx.restore();
            
            // Head (large infinity)
            drawInfinity(x+16, y+6, 20, null, '#3b82f6', '#3b82f6');
            
            // Anime eyes
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#3b82f6';
            ctx.beginPath();
            ctx.ellipse(x+9, y+2, 4.5, 6, 0, 0, Math.PI*2);
            ctx.ellipse(x+23, y+2, 4.5, 6, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#3b82f6';
            ctx.beginPath();
            ctx.ellipse(x+9, y+2, 2.8, 4, 0, 0, Math.PI*2);
            ctx.ellipse(x+23, y+2, 2.8, 4, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(x+8, y+1, 1.5, 0, Math.PI*2);
            ctx.arc(x+22, y+1, 1.5, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(x+6, y-1, 0.8, 0, Math.PI*2);
            ctx.arc(x+20, y-1, 0.8, 0, Math.PI*2);
            ctx.fill();
            
            // Anime hair
            ctx.fillStyle = '#1a2a4a';
            ctx.fillRect(x+4, y-8, 24, 8);
            ctx.fillRect(x+6, y-12, 20, 6);
            
            ctx.restore();
        }

        function drawGround() {
            for (let seg of groundSegments) {
                let drawX = seg.x - worldOffset;
                ctx.fillStyle = '#1a2a3a';
                ctx.fillRect(drawX, seg.y, seg.w, 12);
                ctx.fillStyle = '#2a3a4a';
                ctx.fillRect(drawX, seg.y-4, seg.w, 5);
            }
        }

        function drawCollectibles() {
            for (let c of collectibles) {
                let floatY = Math.sin(Date.now() * 0.003 + c.floatOffset) * 3;
                drawInfinity(c.x, c.y + floatY, c.radius, c.value, '#3b82f6', '#3b82f6');
            }
        }

        function drawViruses() {
            for (let v of viruses) {
                drawVirus(v.x, v.y, v.shake);
            }
        }

        // Stars
        let stars = [];
        for (let i = 0; i < 120; i++) {
            stars.push({ x: Math.random() * W, y: Math.random() * H, size: Math.random() * 2, alpha: 0.3 + Math.random() * 0.7 });
        }
        
        let bgInfinity = [];
        for (let i = 0; i < 12; i++) {
            bgInfinity.push({ x: Math.random() * W, y: 40 + Math.random() * 180, size: 20 + Math.random() * 15, speed: 0.05 + Math.random() * 0.15 });
        }

        function drawBackground() {
            let grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#0a0a2a');
            grad.addColorStop(0.5, '#15153a');
            grad.addColorStop(1, '#1a1a3a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
            
            for (let s of stars) {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                ctx.fillRect(s.x, s.y, s.size, s.size);
                s.x -= 0.1;
                if (s.x < 0) s.x = W;
            }
            
            // GIANT PURPLE INFINITY SYMBOL - CENTERED
            ctx.save();
            ctx.shadowBlur = 40;
            ctx.shadowColor = '#a855f7';
            ctx.globalAlpha = 0.9;
            drawInfinity(W/2, H/3.2, 65, null, '#a855f7', '#a855f7');
            ctx.restore();
            
            for (let b of bgInfinity) {
                ctx.save();
                ctx.globalAlpha = 0.2;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#3b82f6';
                drawInfinity(b.x, b.y, b.size, null, '#3b82f6', '#3b82f6');
                ctx.restore();
                b.x -= b.speed;
                if (b.x + b.size < 0) b.x = W + b.size;
            }
        }

        function gameOver() {
            if (!gameRunning) return;
            gameRunning = false;
            document.getElementById('finalScore').innerText = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        function restartGame() {
            gameRunning = true;
            score = 0;
            currentSpeed = 2.5;
            worldOffset = 0;
            hitBlinkCounter = 0;
            document.getElementById('score').innerHTML = '♾️ IFC: 0';
            player.y = GROUND_Y - player.height;
            player.vy = 0;
            player.grounded = true;
            player.doubleJumpUsed = false;
            player.x = 100;
            collectibles = [];
            viruses = [];
            initGround();
            for (let i = 0; i < 4; i++) setTimeout(() => spawnCollectible(), i * 300);
            for (let i = 0; i < 2; i++) setTimeout(() => spawnVirus(), i * 800);
            document.getElementById('gameOver').style.display = 'none';
        }

        document.getElementById('jumpBtn').onclick = (e) => { e.preventDefault(); jump(); };
        document.getElementById('restartBtn').onclick = () => restartGame();
        window.onkeydown = (e) => { if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); } };
        canvas.ontouchstart = (e) => { e.preventDefault(); jump(); };
        canvas.onmousedown = (e) => { e.preventDefault(); jump(); };

        function updateGame() {
            if (gameRunning) {
                updateWorld();
                updatePlayer();
                updateCollectibles();
                updateViruses();
            }
            frame++;
        }

        function draw() {
            drawBackground();
            drawGround();
            drawCollectibles();
            drawViruses();
            drawPlayer();
            ctx.font = 'bold 10px monospace';
            ctx.fillStyle = '#3b82f6';
            ctx.shadowBlur = 5;
            ctx.shadowColor = '#3b82f6';
            ctx.fillText('✦ COLLECT INFINITE SAMPLES ✦', W/2-105, 32);
            ctx.shadowBlur = 0;
        }

        function animate() { updateGame(); draw(); requestAnimationFrame(animate); }

        initGround();
        player.y = GROUND_Y - player.height;
        player.grounded = true;
        animate();

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }
    })();
</script>
</body>
</html>
